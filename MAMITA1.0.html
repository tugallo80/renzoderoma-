<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comunicador Mamá</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin-bottom: 20px;
            color: #333;
        }

        /* GRID DE BOTONES */
        #grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 500px;
        }

        /* ESTILO DE LA TARJETA (BOTÓN) */
        .card {
            background-color: white;
            border: none;
            border-radius: 20px;
            padding: 15px 5px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.1s;
            
            /* EFECTO 3D */
            box-shadow: 0 6px 0 #d1d5db, 0 10px 10px rgba(0,0,0,0.1);
            position: relative;
            top: 0;
            
            /* Evitar selección de texto y menú contextual por defecto */
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none; /* iOS Safari */
        }

        /* ESTADO PRESIONADO */
        .card:active {
            top: 6px;
            box-shadow: 0 0 0 #d1d5db, inset 0 2px 5px rgba(0,0,0,0.1);
        }

        .emoji-icon {
            font-size: 3rem;
            margin-bottom: 5px;
            line-height: 1;
        }

        .card-text {
            font-size: 0.9rem;
            font-weight: 600;
            color: #333;
            text-align: center;
            line-height: 1.2;
        }

        /* Botón AGREGAR */
        .card.add-card {
            background-color: #eef2f5;
            color: #666;
        }
        .add-icon {
            font-size: 3rem;
            font-weight: bold;
            color: #555;
            margin-bottom: 5px;
        }

        /* VENTANA EMERGENTE (MODAL) */
        #modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 20px;
            width: 85%;
            max-width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: left;
        }

        .modal-content h3 {
            margin-top: 0;
            text-align: center;
        }

        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-modal {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
        }
        .btn-save { background-color: #4CAF50; color: white; }
        .btn-cancel { background-color: #f44336; color: white; }
        
        /* Botón extra para eliminar solo visible en modo edición */
        .btn-delete {
            background-color: #9e9e9e; 
            color: white; 
            margin-top: 10px;
            width: 100%;
        }

    </style>
</head>
<body>

    <h1>Comunicación</h1>

    <div id="grid-container">
        </div>

    <div id="modal-overlay">
        <div class="modal-content">
            <h3 id="modal-title">Nuevo Botón</h3>
            
            <div class="form-group">
                <label>1. Emoji (Visual):</label>
                <input type="text" id="inputEmoji" placeholder="Ej: 🍎" style="font-size: 1.5rem; text-align:center;">
            </div>

            <div class="form-group">
                <label>2. Texto del Botón:</label>
                <input type="text" id="inputLabel" placeholder="Ej: Manzana">
            </div>

            <div class="form-group">
                <label>3. Texto a Voz (Audio):</label>
                <input type="text" id="inputSpeech" placeholder="Ej: Quiero comer una manzana">
            </div>

            <div class="modal-buttons">
                <button class="btn-modal btn-cancel" onclick="closeModal()">Cancelar</button>
                <button class="btn-modal btn-save" onclick="saveButton()">Guardar</button>
            </div>
            
            <button id="btn-delete" class="btn-modal btn-delete" style="display:none;" onclick="deleteButton()">Eliminar Botón</button>
        </div>
    </div>

    <script>
        // Datos iniciales
        let defaultButtons = [
            { emoji: '💧', label: 'Tengo\nsed', speech: 'Tengo sed, quiero agua por favor' },
            { emoji: '🍲', label: 'Tengo\nhambre', speech: 'Tengo hambre, quiero comer' },
            { emoji: '😫', label: 'Me\nduele', speech: 'Siento dolor, ayúdame' },
            { emoji: '🚽', label: 'Necesito\nir al baño', speech: 'Necesito ir al baño' },
            { emoji: '🔥', label: 'Me\npica', speech: 'Me pica el cuerpo' },
            { emoji: '❤️', label: 'Te\namo', speech: 'Te quiero mucho' },
            { emoji: '😴', label: 'Tengo\nsueño', speech: 'Tengo sueño, quiero dormir' },
            { emoji: '🆘', label: 'Necesito\nayuda', speech: 'Emergencia, necesito ayuda por favor' }
        ];

        const container = document.getElementById('grid-container');
        let editingIndex = -1; // -1 significa que estamos creando uno nuevo
        let pressTimer; // Temporizador para el clic largo
        let isLongPress = false; // Bandera para diferenciar clic de presión larga

        // --- RENDERIZADO ---
        function renderButtons() {
            container.innerHTML = '';

            defaultButtons.forEach((btn, index) => {
                const buttonEl = document.createElement('button');
                buttonEl.className = 'card';
                
                // Eventos para detectar "Mantener presionado"
                // Deshabilitamos menú contextual (clic derecho) para que no estorbe en Android
                buttonEl.oncontextmenu = (e) => { e.preventDefault(); e.stopPropagation(); return false; };
                
                // Eventos Táctiles (Móvil)
                buttonEl.ontouchstart = () => startPress(index);
                buttonEl.ontouchend = () => endPress(btn.speech);
                buttonEl.ontouchcancel = cancelPress;
                
                // Eventos Ratón (PC)
                buttonEl.onmousedown = () => startPress(index);
                buttonEl.onmouseup = () => endPress(btn.speech);
                buttonEl.onmouseleave = cancelPress;

                buttonEl.innerHTML = `
                    <div class="emoji-icon">${btn.emoji}</div>
                    <div class="card-text">${btn.label.replace(/\n/g, '<br>')}</div>
                `;
                container.appendChild(buttonEl);
            });

            // Botón AGREGAR
            const addBtn = document.createElement('button');
            addBtn.className = 'card add-card';
            addBtn.onclick = () => openModal(-1); // -1 indica nuevo botón
            addBtn.innerHTML = `
                <div class="add-icon">+</div>
                <div class="card-text">Agregar</div>
            `;
            container.appendChild(addBtn);
        }

        // --- LÓGICA DE PRESIÓN LARGA (EDITAR vs HABLAR) ---
        
        function startPress(index) {
            isLongPress = false;
            // Esperamos 800ms para considerarlo "presión larga"
            pressTimer = setTimeout(() => {
                isLongPress = true;
                if (navigator.vibrate) navigator.vibrate([50, 100]); // Vibración doble al entrar en edición
                openModal(index); // Abrir modo edición
            }, 800);
        }

        function endPress(speechText) {
            clearTimeout(pressTimer); // Cancelar temporizador si soltó antes
            if (!isLongPress) {
                // Si fue un toque rápido (no larga duración), HABLAR
                playAction(speechText);
            }
        }

        function cancelPress() {
            clearTimeout(pressTimer); // Si arrastra el dedo fuera, cancelamos todo
        }

        function playAction(text) {
            if (navigator.vibrate) navigator.vibrate(50);
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'es-ES';
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
        }

        // --- GESTIÓN DEL MODAL ---

        function openModal(index) {
            editingIndex = index;
            const modal = document.getElementById('modal-overlay');
            const title = document.getElementById('modal-title');
            const btnDelete = document.getElementById('btn-delete');

            if (index >= 0) {
                // MODO EDICIÓN
                title.innerText = "Editar Botón";
                const btn = defaultButtons[index];
                document.getElementById('inputEmoji').value = btn.emoji;
                document.getElementById('inputLabel').value = btn.label;
                document.getElementById('inputSpeech').value = btn.speech;
                btnDelete.style.display = 'block'; // Mostrar botón borrar
            } else {
                // MODO CREAR
                title.innerText = "Nuevo Botón";
                document.getElementById('inputEmoji').value = '';
                document.getElementById('inputLabel').value = '';
                document.getElementById('inputSpeech').value = '';
                btnDelete.style.display = 'none'; // Ocultar botón borrar
            }

            modal.style.display = 'flex';
            if (navigator.vibrate) navigator.vibrate(30);
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
        }

        function saveButton() {
            const emoji = document.getElementById('inputEmoji').value.trim() || '🟣';
            const label = document.getElementById('inputLabel').value.trim();
            const speech = document.getElementById('inputSpeech').value.trim();

            if (!label || !speech) {
                alert('Faltan datos');
                return;
            }

            const newButtonData = { emoji, label, speech };

            if (editingIndex >= 0) {
                // ACTUALIZAR EXISTENTE
                defaultButtons[editingIndex] = newButtonData;
            } else {
                // CREAR NUEVO
                defaultButtons.push(newButtonData);
            }
            
            renderButtons();
            closeModal();
            if (navigator.vibrate) navigator.vibrate([50, 50]);
        }

        function deleteButton() {
            if (editingIndex >= 0) {
                if(confirm("¿Seguro que quieres borrar este botón?")) {
                    defaultButtons.splice(editingIndex, 1);
                    renderButtons();
                    closeModal();
                }
            }
        }

        // Iniciar
        renderButtons();

    </script>
</body>
</html>
