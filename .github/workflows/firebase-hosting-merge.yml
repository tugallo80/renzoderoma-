# Deploy automático a Firebase Hosting + Functions en cada push a main
name: Deploy to Firebase on merge
on:
  push:
    branches:
      - main
jobs:
  deploy_hosting:
    name: Deploy Hosting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy Hosting
        run: npx firebase-tools deploy --only hosting --token "${{ secrets.FIREBASE_TOKEN }}" --project rubik-bolivia --non-interactive

  deploy_database_rules:
    name: Deploy Database Rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy Database Rules
        run: npx firebase-tools deploy --only database --token "${{ secrets.FIREBASE_TOKEN }}" --project rubik-bolivia --non-interactive

  deploy_functions:
    name: Deploy Functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Instalar dependencias de Functions
        run: npm install
        working-directory: functions
      - name: Deploy Functions
        run: npx firebase-tools deploy --only functions --token "${{ secrets.FIREBASE_TOKEN }}" --project rubik-bolivia --non-interactive --force
