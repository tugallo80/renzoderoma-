name: Deploy to Firebase

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Write functions .env
        run: |
          cat > functions/.env << ENVEOF
          GEMINI_KEY=${{ secrets.GEMINI_KEY }}
          WA_TOKEN=${{ secrets.WA_TOKEN }}
          WA_VERIFY_TOKEN=${{ secrets.WA_VERIFY_TOKEN }}
          ADMIN_PHONE=${{ secrets.ADMIN_PHONE }}
          WA_PHONE_ID=1100203513168717
          ENVEOF

      - name: Install functions dependencies
        run: npm install
        working-directory: functions

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase
        run: firebase deploy --token "${{ secrets.FIREBASE_TOKEN }}" --project rubik-bolivia --non-interactive --force
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
