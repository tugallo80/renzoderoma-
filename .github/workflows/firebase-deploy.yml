name: Deploy to Firebase

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Write functions .env
        run: |
          printf 'GEMINI_KEY=%s\nWA_TOKEN=%s\nWA_VERIFY_TOKEN=%s\nADMIN_PHONE=%s\nWA_PHONE_ID=1100203513168717\n' \
            "${{ secrets.GEMINI_KEY }}" \
            "${{ secrets.WA_TOKEN }}" \
            "${{ secrets.WA_VERIFY_TOKEN }}" \
            "${{ secrets.ADMIN_PHONE }}" \
            > functions/.env

      - name: Install functions dependencies
        run: npm install
        working-directory: functions

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase
        run: firebase deploy --token "${{ secrets.FIREBASE_TOKEN }}" --project rubik-bolivia --non-interactive --force
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
