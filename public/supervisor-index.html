<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal Supervisor - Rubik OS</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script>
        window._rubikFirebaseConfig = window._rubikFirebaseConfig || {
            apiKey: "AIzaSyDXYlofy31cDP14xVAVxWo_7TqXdSgsIjA",
            authDomain: "rubik-bolivia.firebaseapp.com",
            databaseURL: "https://rubik-bolivia-default-rtdb.firebaseio.com",
            projectId: "rubik-bolivia",
            storageBucket: "rubik-bolivia.firebasestorage.app",
            messagingSenderId: "4153087958",
            appId: "1:4153087958:web:cf2dd16106580ed6437677"
        };
        if (!firebase.apps.length) firebase.initializeApp(window._rubikFirebaseConfig);
    </script>
    <script src="/js/firecache.js?v=1"></script>
    <script src="/js/auth-guard.js?v=1"></script>
    <style>
        :root { --bg: #f2f2f7; --card: #ffffff; --text: #1c1c1e; --blue: #007aff; --green: #34c759; --orange: #ff9500; --red: #ff3b30; --gray: #8e8e93; --border: #e5e5ea; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; padding-bottom: 120px; -webkit-tap-highlight-color: transparent;}
        .header { text-align: center; margin-bottom: 25px; }
        .logo-img { height: 50px; border-radius: 10px; margin-bottom: 10px; }
        .user-badge { background: var(--blue); color: white; padding: 5px 15px; border-radius: 20px; font-size: 11px; font-weight: 800; display: inline-block; text-transform: uppercase; margin-bottom: 10px; }
        .title { font-size: 24px; font-weight: 900; letter-spacing: -0.5px; }
        
        .list-container { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        .project-card { background: var(--card); border-radius: 20px; padding: 20px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid var(--border); text-decoration: none; color: inherit; transition: 0.2s; }
        .project-card:active { transform: scale(0.97); background: #f9f9f9; }
        .p-info { display: flex; flex-direction: column; gap: 4px; }
        .p-name { font-size: 17px; font-weight: 800; }
        .p-meta { font-size: 12px; color: var(--gray); font-weight: 600; }
        .p-icon { width: 45px; height: 45px; background: rgba(0,122,255,0.1); color: var(--blue); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 24px; }

        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; display: flex; justify-content: center; align-items: center; flex-direction: column; font-weight: 800; color: var(--blue); }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(0,122,255,0.1); border-top: 4px solid var(--blue); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    <link rel="stylesheet" href="/css/responsive.css?v=1">
</head>
<body>

<div id="loader"><div class="spinner"></div>Cargando Panel Supervisor...</div>

<div class="header">
    <img loading="lazy" decoding="async" src="logo.png" class="logo-img" onerror="this.style.display='none'">
    <br>
    <div class="user-badge">Supervisor de Obra</div>
    <div class="title" id="txt-welcome">Hola Supervisor</div>
</div>

<div class="list-container" id="list-projects"></div>

<script>
    // Firebase ya inicializado en el <head>
    if (!firebase.apps.length) firebase.initializeApp(window._rubikFirebaseConfig);
    const db = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const wid = urlParams.get('wid') || localStorage.getItem('rubik_sup_id');

    if(!wid) { alert("ID de Supervisor no detectado."); window.location.href="../login.html"; }
    else { localStorage.setItem('rubik_sup_id', wid); }

    db.ref('personal/' + wid).once('value', snap => {
        if(snap.exists()) {
            const name = snap.val().nombre || "Supervisor";
            document.getElementById('txt-welcome').innerText = "Hola, " + name.split(' ')[0];
        }
        (function arrancarCarga() {
        var auth = firebase.auth();
        if (auth.currentUser) { cargarProyectos(); return; }
        var unsub = auth.onAuthStateChanged(function(user) {
            unsub();
            if (user) { cargarProyectos(); }
            else { window.location.href = 'login.html'; }
        });
    })();
    });

    function cargarProyectos() {
        const cont = document.getElementById('list-projects');
        cont.innerHTML = "";

        db.ref('proyectos').once('value', snap => {
            let found = false;
            snap.forEach(cliSnap => {
                cliSnap.forEach(proySnap => {
                    const p = proySnap.val();
                    const pid = proySnap.key;
                    const cid = cliSnap.key;

                    let hasAccess = false;
                    if(p.licitaciones) {
                        Object.values(p.licitaciones).forEach(lic => {
                            if(lic.worker_id === wid && (lic.estado === 'aprobado' || lic.estado === 'adjudicado' || lic.estado === 'terminado')) hasAccess = true;
                        });
                    }

                    if(hasAccess && p.estado !== 'archivado') {
                        found = true;
                        cont.innerHTML += `
                            <a href="supervisor-obra.html?cid=${cid}&pid=${pid}&wid=${wid}" class="project-card">
                                <div class="p-info">
                                    <span class="p-name">${p.nombre}</span>
                                    <span class="p-meta"><i class="ph-fill ph-calendar"></i> Entrega: ${p.fecha_entrega || 'Pendiente'}</span>
                                </div>
                                <div class="p-icon"><i class="ph-bold ph-caret-right"></i></div>
                            </a>`;
                    }
                });
            });

            if(!found) cont.innerHTML = '<div style="text-align:center; padding:40px; color:var(--gray); font-weight:bold;">No tienes obras asignadas actualmente.</div>';
            document.getElementById('loader').style.display = 'none';
        });
    }
</script>
    <script src="/js/viewmode.js?v=1"></script>
<script src="/paste-image.js"></script>
</body>
</html>
