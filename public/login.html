<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Rubik OS - Acceso</title>

    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Rubik OS">
    <link rel="icon" type="image/png" href="/icono app.png">
    <link rel="shortcut icon" href="/icono app.png">
    <link rel="apple-touch-icon" href="/icono app.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/icono app.png">
    <link rel="apple-touch-icon" sizes="512x512" href="/icono app.png">

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000000;
            color: #ffffff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .login-card {
            background-color: #1c1c1e;
            width: 100%;
            max-width: 380px;
            padding: 45px 30px;
            border-radius: 28px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.9);
            text-align: center;
        }

        .login-logo {
            width: 110px;
            height: 110px;
            object-fit: contain;
            margin: 0 auto 18px auto;
            display: block;
            border-radius: 22px;
            background: #ffffff10;
            padding: 12px;
            box-shadow: 0 6px 18px rgba(0, 122, 255, 0.15);
        }
        h2 { font-size: 30px; font-weight: 700; margin: 0 0 8px 0; letter-spacing: -0.5px; }
        p.subtitle { color: #a1a1a6; font-size: 15px; margin-bottom: 35px; }

        input {
            width: 100%;
            background-color: #2c2c2e;
            color: #ffffff;
            border: 1px solid #3a3a3c;
            border-radius: 14px;
            padding: 16px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            margin-bottom: 15px;
            transition: all 0.2s;
        }
        input:focus { border-color: #007aff; background-color: #3a3a3c; }

        /* ESTILO PREMIUM PARA EL RECORDAR CUENTA */
        .remember-container {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 10px;
            margin-bottom: 20px;
            padding-left: 5px;
            font-size: 14px;
            color: #a1a1a6;
            cursor: pointer;
            user-select: none;
            text-align: left;
        }
        .remember-container input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin: 0;
            accent-color: #007aff; /* Azul Apple */
            cursor: pointer;
        }

        button {
            width: 100%;
            background-color: #007aff;
            color: #ffffff;
            border: none;
            border-radius: 16px;
            padding: 18px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
            margin-top: 10px;
        }

        button:active { transform: scale(0.97); }
        button:hover { background-color: #006ee6; }

        #error-msg {
            color: #ff453a;
            font-size: 14px;
            margin-top: 20px;
            min-height: 40px; 
            line-height: 1.4;
        }
    </style>
    <link rel="stylesheet" href="/css/responsive.css?v=1">
</head>
<body>

<div class="login-card">
    <img src="/rubik_blanco.png" alt="Rubik OS" class="login-logo">
    <h2>Rubik OS</h2>
    <p class="subtitle">Cuartel General</p>
    
    <input type="email" id="email" placeholder="Correo electrónico" autocomplete="email" name="username">
    <input type="password" id="password" placeholder="Contraseña" name="password" onkeydown="if(event.key==='Enter') iniciarSesion()">
    
    <label class="remember-container">
        <input type="checkbox" id="remember">
        <span>Recordar sesión en este dispositivo</span>
    </label>

    <div style="display:flex; gap:8px; margin: 12px 0 4px 0;">
        <button id="btn-web"   type="button" onclick="setViewMode('web')"
                style="flex:1; background:#2c2c2e; color:#a1a1a6; border:1px solid #3a3a3c; padding:11px; font-size:13px; margin:0;">🖥️ Versión Web</button>
        <button id="btn-mobile" type="button" onclick="setViewMode('mobile')"
                style="flex:1; background:#2c2c2e; color:#a1a1a6; border:1px solid #3a3a3c; padding:11px; font-size:13px; margin:0;">📱 Versión Móvil</button>
    </div>

    <button type="button" onclick="iniciarSesion()">Ingresar al Hub</button>

    <a href="#" id="link-recover" onclick="recuperarPassword(event)"
       style="display:block; text-align:center; color:#0a84ff; font-size:13px; font-weight:600; margin-top:14px; text-decoration:none;">¿Olvidaste tu contraseña?</a>

    <div id="error-msg"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDXYlofy31cDP14xVAVxWo_7TqXdSgsIjA", 
        authDomain: "rubik-bolivia.firebaseapp.com",
        databaseURL: "https://rubik-bolivia-default-rtdb.firebaseio.com",
        projectId: "rubik-bolivia",
        storageBucket: "rubik-bolivia.firebasestorage.app",
        messagingSenderId: "4153087958",
        appId: "1:4153087958:web:cf2dd16106580ed6437677"
    };

    // Inicializar Firebase
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }

    // ?next=/xxx para redirigir donde el usuario quería ir
    function getNextUrl() {
        try {
            const p = new URLSearchParams(window.location.search).get('next');
            if (p && p.startsWith('/')) return decodeURIComponent(p);
        } catch(_) {}
        return 'index.html';
    }

    // Marca visualmente el botón Web/Móvil seleccionado y guarda preferencia
    function setViewMode(mode) {
        localStorage.setItem('rubik_view_mode', mode);
        const sel = mode === 'web' ? 'btn-web' : 'btn-mobile';
        const otr = mode === 'web' ? 'btn-mobile' : 'btn-web';
        const a = document.getElementById(sel), b = document.getElementById(otr);
        if (a) { a.style.background = '#007aff'; a.style.color = '#fff'; a.style.borderColor = '#007aff'; }
        if (b) { b.style.background = '#2c2c2e'; b.style.color = '#a1a1a6'; b.style.borderColor = '#3a3a3c'; }
    }

    // Recuperar contraseña → manda WhatsApp al agente IA
    function recuperarPassword(ev) {
        if (ev && ev.preventDefault) ev.preventDefault();
        const email = (document.getElementById('email').value || '').trim();
        const linea = email
            ? `Hola agente IA, olvidé mi contraseña de Rubik OS. Mi email es: ${email}`
            : `Hola agente IA, olvidé mi contraseña de Rubik OS. Por favor ayúdame a recuperar el acceso.`;
        const url = `https://wa.me/59176868833?text=${encodeURIComponent(linea)}`;
        window.open(url, '_blank');
    }

    // Al cargar: prefill email, marcar vista preferida, y AUTO-REDIRECT si ya hay sesión
    document.addEventListener("DOMContentLoaded", () => {
        const correoGuardado = localStorage.getItem("rubik_remember_user");
        if (correoGuardado) {
            document.getElementById("email").value = correoGuardado;
            document.getElementById("remember").checked = true;
        }
        // Vista preferida (default = web)
        setViewMode(localStorage.getItem('rubik_view_mode') || 'web');

        // Si Firebase Auth ya tiene una sesión de HUB (email/password), entrar directo
        // Sesiones anónimas (de cliente-view) NO deben entrar automáticamente
        let _anonSignedOut = false;
        firebase.auth().onAuthStateChanged((user) => {
            if (user && !user.isAnonymous && user.email) {
                document.getElementById('error-msg').style.color = "#32d74b";
                document.getElementById('error-msg').innerText = "Sesión activa detectada. Entrando...";
                setTimeout(() => { window.location.href = getNextUrl(); }, 400);
            } else if (user && user.isAnonymous && !_anonSignedOut) {
                // Limpiar sesión anónima una sola vez
                _anonSignedOut = true;
                firebase.auth().signOut().catch(() => {});
            }
        });
    });

    function iniciarSesion() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const rememberChecked = document.getElementById('remember').checked;
        const errorMsg = document.getElementById('error-msg');

        if(!email || !password) {
            errorMsg.style.color = "#ff453a";
            errorMsg.innerText = "Por favor, completa ambos campos.";
            return;
        }

        errorMsg.style.color = "#a1a1a6";
        errorMsg.innerText = "Verificando acceso...";

        const auth = firebase.auth();
        const tipopersistencia = rememberChecked
            ? firebase.auth.Auth.Persistence.LOCAL
            : firebase.auth.Auth.Persistence.SESSION;

        // Si hay sesión anónima activa, limpiarla primero antes de hacer login
        const cur = auth.currentUser;
        const preSignOut = (cur && cur.isAnonymous) ? auth.signOut() : Promise.resolve();

        preSignOut
            .then(() => auth.setPersistence(tipopersistencia))
            .then(() => auth.signInWithEmailAndPassword(email, password))
            .then(() => {
                window.location.href = 'index.html';
            })
            .catch(err => {
                let msg = 'Error al iniciar sesión.';
                if (err.code === 'auth/wrong-password' || err.code === 'auth/user-not-found' || err.code === 'auth/invalid-credential') msg = 'Email o contraseña incorrectos.';
                else if (err.code === 'auth/too-many-requests') msg = 'Demasiados intentos. Intenta más tarde.';
                else if (err.code === 'auth/invalid-email') msg = 'Email inválido.';
                errorMsg.style.color = "#ff453a";
                errorMsg.innerText = msg;
            });
    }
    </script>
</body>
</html>
