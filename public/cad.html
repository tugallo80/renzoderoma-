<style>
:root {
  --bg: #f4f4f7;
  --card: #fff;
  --text: #1a1a1a;
  --blue: #007aff;
  --green: #34c759;
  --red: #ff3b30;
  --orange: #ff9500;
  --purple: #af52de;
  --gray: #8e8e93;
  --border: #d1d1d6;
}
body.dark-mode {
  --bg: #000;
  --card: #1c1c1e;
  --text: #fff;
  --border: #333;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* TOP BAR */
#top-bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 52px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 8px;
  overflow-x: auto;
  overflow-y: hidden;
  z-index: 100;
  white-space: nowrap;
  scrollbar-width: none;
}
#top-bar::-webkit-scrollbar { display: none; }

/* BOTTOM BAR */
#bottom-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 64px;
  background: var(--card);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 8px;
  overflow-x: auto;
  overflow-y: hidden;
  z-index: 100;
  white-space: nowrap;
  scrollbar-width: none;
}
#bottom-bar::-webkit-scrollbar { display: none; }

/* CANVAS AREA */
#canvas-container {
  position: fixed;
  top: 52px;
  bottom: 64px;
  left: 0;
  right: 0;
  overflow: hidden;
  background: #f8f8f8;
}
body.dark-mode #canvas-container { background: #1a1a1a; }
#cad-canvas {
  display: block;
  touch-action: none;
  cursor: crosshair;
}
#cad-canvas.cursor-default { cursor: default; }
#cad-canvas.cursor-move { cursor: move; }
#cad-canvas.cursor-grab { cursor: grab; }
#cad-canvas.cursor-grabbing { cursor: grabbing; }
#cad-canvas.cursor-crosshair { cursor: crosshair; }

/* BUTTONS */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 6px 10px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text);
  font-size: 13px;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.15s;
  flex-shrink: 0;
}
.btn:hover { background: var(--bg); }
.btn.active { background: var(--blue); color: #fff; border-color: var(--blue); }
.btn.icon-only { padding: 6px 8px; font-size: 16px; }
.btn-back {
  font-size: 13px;
  font-weight: 600;
  padding: 6px 12px;
  color: var(--blue);
  background: none;
  border: none;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
}

/* SEGMENTED CONTROL */
.seg-ctrl {
  display: inline-flex;
  background: var(--bg);
  border-radius: 8px;
  padding: 2px;
  gap: 1px;
  border: 1px solid var(--border);
  flex-shrink: 0;
}
.seg-ctrl button {
  padding: 4px 10px;
  border-radius: 6px;
  border: none;
  background: none;
  color: var(--text);
  font-size: 12px;
  cursor: pointer;
  transition: background 0.15s;
}
.seg-ctrl button.active {
  background: var(--blue);
  color: #fff;
}

/* GRID CONTROLS */
#grid-spacing-wrap {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
}
.small-input {
  width: 52px;
  padding: 4px 6px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg);
  color: var(--text);
  font-size: 12px;
  text-align: center;
}
.small-label { font-size: 11px; color: var(--gray); }

/* DIVIDER */
.bar-div {
  width: 1px;
  height: 28px;
  background: var(--border);
  flex-shrink: 0;
}

/* TOOL BUTTONS */
.tool-btn {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  padding: 4px 8px;
  border-radius: 10px;
  border: 1px solid transparent;
  background: transparent;
  color: var(--text);
  font-size: 10px;
  cursor: pointer;
  min-width: 52px;
  transition: background 0.15s;
  flex-shrink: 0;
}
.tool-btn i { font-size: 20px; }
.tool-btn:hover { background: var(--bg); }
.tool-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); }

/* LAYER PANEL */
#layer-panel {
  position: fixed;
  top: 52px;
  right: -300px;
  width: 280px;
  bottom: 64px;
  background: var(--card);
  border-left: 1px solid var(--border);
  z-index: 150;
  transition: right 0.25s ease;
  display: flex;
  flex-direction: column;
}
#layer-panel.open { right: 0; }
#layer-panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  font-weight: 600;
  font-size: 15px;
}
#layer-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}
.layer-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px;
  border-radius: 8px;
  cursor: pointer;
  margin-bottom: 4px;
  border: 2px solid transparent;
}
.layer-row:hover { background: var(--bg); }
.layer-row.active { border-color: var(--blue); background: rgba(0,122,255,0.08); }
.layer-icon-btn {
  width: 26px;
  height: 26px;
  border: none;
  background: none;
  cursor: pointer;
  color: var(--text);
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}
.layer-icon-btn:hover { background: var(--bg); }
.layer-icon-btn.muted { color: var(--gray); }
.layer-name-inp {
  flex: 1;
  background: none;
  border: none;
  font-size: 13px;
  color: var(--text);
  cursor: text;
  padding: 2px 4px;
  border-radius: 4px;
  font-family: inherit;
}
.layer-name-inp:focus {
  outline: 1px solid var(--blue);
  background: var(--bg);
}
.layer-del-btn {
  width: 24px;
  height: 24px;
  border: none;
  background: none;
  cursor: pointer;
  color: var(--red);
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}
#add-layer-btn {
  margin: 8px;
  padding: 8px;
  border-radius: 8px;
  border: 1px dashed var(--border);
  background: none;
  color: var(--blue);
  font-size: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  justify-content: center;
}

/* MODAL */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
.modal-overlay.hidden { display: none; }
.modal {
  background: var(--card);
  border-radius: 16px;
  padding: 24px;
  width: 100%;
  max-width: 360px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
}
.modal h3 {
  font-size: 17px;
  font-weight: 600;
  margin-bottom: 16px;
}
.modal-field {
  margin-bottom: 14px;
}
.modal-field label {
  display: block;
  font-size: 12px;
  color: var(--gray);
  margin-bottom: 4px;
}
.modal-field input[type=number],
.modal-field input[type=text],
.modal-field select {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  font-family: inherit;
}
.modal-field input[type=number]:focus,
.modal-field input[type=text]:focus,
.modal-field select:focus { outline: 2px solid var(--blue); }
.modal-radio-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 12px;
}
.modal-radio-group label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 14px;
  cursor: pointer;
}
.modal-btns {
  display: flex;
  gap: 8px;
  margin-top: 20px;
}
.modal-btn {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  cursor: pointer;
  font-weight: 500;
  font-family: inherit;
}
.modal-btn.primary {
  background: var(--blue);
  color: #fff;
  border-color: var(--blue);
}

/* POPOVER */
.popover {
  position: absolute;
  top: 100%;
  right: 0;
  margin-top: 6px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  z-index: 300;
  min-width: 180px;
  overflow: hidden;
}
.popover.hidden { display: none; }
.popover-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  cursor: pointer;
  font-size: 14px;
  transition: background 0.1s;
}
.popover-item:hover { background: var(--bg); }
.save-wrap { position: relative; }

/* TOAST */
#toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.75);
  color: #fff;
  padding: 8px 18px;
  border-radius: 20px;
  font-size: 14px;
  z-index: 999;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s;
  white-space: nowrap;
}
#toast.show { opacity: 1; }

/* STYLE CONTROLS */
.style-wrap {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 0 4px;
  flex-shrink: 0;
}
.style-wrap label { font-size: 11px; color: var(--gray); }
input[type=color].color-pick {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  border: 1px solid var(--border);
  padding: 2px;
  cursor: pointer;
  background: none;
}
input[type=number].stroke-inp {
  width: 46px;
  padding: 4px 6px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg);
  color: var(--text);
  font-size: 12px;
  text-align: center;
  font-family: inherit;
}

/* FLOATING SHAPE ACTION BAR */
#shape-actions {
  position: fixed;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  display: flex;
  gap: 2px;
  padding: 4px;
  z-index: 120;
}
#shape-actions button {
  padding: 6px 10px;
  border-radius: 6px;
  border: none;
  background: none;
  color: var(--text);
  font-size: 12px;
  cursor: pointer;
  white-space: nowrap;
  font-family: inherit;
  display: flex;
  align-items: center;
  gap: 4px;
}
#shape-actions button:hover { background: var(--bg); }
#shape-actions button.danger { color: var(--red); }

/* COORDS DISPLAY */
#coords-display {
  position: fixed;
  bottom: 70px;
  left: 8px;
  font-size: 11px;
  color: var(--gray);
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 2px 8px;
  pointer-events: none;
  z-index: 90;
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="top-bar">
  <button class="btn-back" onclick="goBack()">&#8592; Diseños</button>
  <div class="bar-div"></div>
  <div class="seg-ctrl" id="unit-ctrl">
    <button onclick="setUnit('cm')" id="unit-cm" class="active">cm</button>
    <button onclick="setUnit('m')" id="unit-m">m</button>
  </div>
  <div class="bar-div"></div>
  <button class="btn icon-only" id="grid-btn" onclick="toggleGrid()" title="Cuadrícula">
    <i class="ph ph-grid-four"></i>
  </button>
  <div id="grid-spacing-wrap" style="display:none">
    <input type="number" class="small-input" id="grid-size-inp" value="10" min="1" max="1000" onchange="setGridSize(this.value)">
    <span class="small-label" id="grid-unit-lbl">cm</span>
  </div>
  <div class="bar-div"></div>
  <button class="btn icon-only" onclick="undo()" title="Deshacer"><i class="ph ph-arrow-counter-clockwise"></i></button>
  <button class="btn icon-only" onclick="redo()" title="Rehacer"><i class="ph ph-arrow-clockwise"></i></button>
  <div class="bar-div"></div>
  <div class="seg-ctrl" id="view-ctrl">
    <button onclick="setView('planta')" id="view-planta" class="active">Planta</button>
    <button onclick="setView('frontal')" id="view-frontal">Frontal</button>
    <button onclick="setView('lateral')" id="view-lateral">Lateral</button>
  </div>
  <button class="btn" id="axo-btn" onclick="toggleAxo()">Axo</button>
  <div class="bar-div"></div>
  <button class="btn icon-only" id="darkmode-btn" onclick="toggleDark()" title="Modo oscuro">
    <i class="ph ph-moon"></i>
  </button>
  <button class="btn icon-only" id="layers-btn" onclick="toggleLayerPanel()" title="Capas">
    <i class="ph ph-stack"></i>
  </button>
  <div class="bar-div"></div>
  <div class="save-wrap">
    <button class="btn" id="save-btn" onclick="toggleSavePopover()">
      <i class="ph ph-floppy-disk"></i> Guardar
    </button>
    <div class="popover hidden" id="save-popover">
      <div class="popover-item" onclick="saveToProject()">
        <i class="ph ph-cloud-arrow-up"></i> Guardar como proyecto
      </div>
      <div class="popover-item" onclick="saveAsImageClean()">
        <i class="ph ph-image"></i> Guardar como imagen en galería
      </div>
      <div class="popover-item" onclick="saveToProduccion()">
        <i class="ph ph-package"></i> Guardar en producción
      </div>
      <div class="popover-item" onclick="exportDXF()">
        <i class="ph ph-file-arrow-down"></i> Exportar DXF
      </div>
    </div>
  </div>
</div>

<!-- CANVAS AREA -->
<div id="canvas-container">
  <canvas id="cad-canvas"></canvas>
</div>

<!-- BOTTOM BAR -->
<div id="bottom-bar">
  <button class="tool-btn" data-tool="rect" onclick="selectTool('rect')">
    <i class="ph ph-rectangle"></i><span>Rect&#225;ngulo</span>
  </button>
  <button class="tool-btn" data-tool="circle" onclick="selectTool('circle')">
    <i class="ph ph-circle"></i><span>C&#237;rculo</span>
  </button>
  <button class="tool-btn" data-tool="oval" onclick="selectTool('oval')">
    <i class="ph ph-circle-dashed"></i><span>&#211;valo</span>
  </button>
  <button class="tool-btn" data-tool="polygon-free" onclick="selectTool('polygon-free')">
    <i class="ph ph-polygon"></i><span>Pol&#237;gono libre</span>
  </button>
  <button class="tool-btn" data-tool="polygon-sym" onclick="selectTool('polygon-sym')">
    <i class="ph ph-hexagon"></i><span>Pol&#237;gono sim.</span>
  </button>
  <button class="tool-btn" data-tool="triangle" onclick="selectTool('triangle')">
    <i class="ph ph-triangle"></i><span>Tri&#225;ngulo</span>
  </button>
  <button class="tool-btn" data-tool="line" onclick="selectTool('line')">
    <i class="ph ph-line-segment"></i><span>L&#237;nea</span>
  </button>
  <div class="bar-div"></div>
  <button class="tool-btn" data-tool="select" onclick="selectTool('select')">
    <i class="ph ph-cursor"></i><span>Seleccionar</span>
  </button>
  <button class="tool-btn" data-tool="move" onclick="selectTool('move')">
    <i class="ph ph-arrows-out-cardinal"></i><span>Mover</span>
  </button>
  <button class="tool-btn" data-tool="section" onclick="selectTool('section')">
    <i class="ph ph-scissors"></i><span>Seccionar</span>
  </button>
  <button class="tool-btn" data-tool="extrude" onclick="selectTool('extrude')">
    <i class="ph ph-cube"></i><span>Extruir</span>
  </button>
  <button class="tool-btn" data-tool="dimension" onclick="selectTool('dimension')">
    <i class="ph ph-ruler"></i><span>Acotar</span>
  </button>
  <div class="bar-div"></div>
  <div class="style-wrap">
    <label>Grosor</label>
    <input type="number" class="stroke-inp" id="stroke-width-inp" value="2" min="1" max="10" onchange="setStrokeWidth(this.value)">
  </div>
  <div class="style-wrap">
    <label>Color</label>
    <input type="color" class="color-pick" id="stroke-color-inp" value="#000000" onchange="setStrokeColor(this.value)">
  </div>
</div>

<!-- LAYER PANEL -->
<div id="layer-panel">
  <div id="layer-panel-header">
    <span>Capas</span>
    <button class="btn icon-only" onclick="toggleLayerPanel()" style="border:none;background:none;font-size:18px;">
      <i class="ph ph-x"></i>
    </button>
  </div>
  <div id="layer-list"></div>
  <button id="add-layer-btn" onclick="addLayer()">
    <i class="ph ph-plus"></i> Nueva capa
  </button>
</div>

<!-- SHAPE ACTIONS FLOATING BAR -->
<div id="shape-actions" style="display:none">
  <button onclick="editSelectedShape()"><i class="ph ph-pencil"></i> Editar</button>
  <button onclick="sectionSelectedShape()"><i class="ph ph-scissors"></i> Seccionar</button>
  <button onclick="extrudeSelectedShape()"><i class="ph ph-cube"></i> Extruir</button>
  <button class="sa-rotate" onclick="rotateSelected(-15)" style="display:none"><i class="ph ph-arrow-counter-clockwise"></i> -15°</button>
  <button class="sa-rotate" onclick="rotateSelected(15)" style="display:none"><i class="ph ph-arrow-clockwise"></i> +15°</button>
  <button onclick="toggleAutoDim()"><i class="ph ph-ruler"></i> Auto-cota</button>
  <button onclick="deleteSelectedShape()" class="danger"><i class="ph ph-trash"></i> Eliminar</button>
</div>

<!-- MODAL OVERLAY -->
<div class="modal-overlay hidden" id="modal-overlay">
  <div class="modal" id="modal-content"></div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- COORDS DISPLAY -->
<div id="coords-display">0, 0 cm</div>

<script>
// ============================================================
//  FIREBASE INIT (Firebase was already initialized in <head>)
// ============================================================
let fbDb = null;
try {
  fbDb = firebase.database();
} catch(e) { console.warn('Firebase database error', e); }

// ============================================================
//  URL PARAMS
// ============================================================
const urlParams = new URLSearchParams(location.search);
const CLIENT_ID = urlParams.get('cid') || '';
const PROJECT_ID = urlParams.get('pid') || '';

// ============================================================
//  UUID
// ============================================================
function genUUID() {
  if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
    var r = Math.random()*16|0, v = c==='x'?r:(r&0x3|0x8);
    return v.toString(16);
  });
}

// ============================================================
//  STATE
// ============================================================
var state = {
  tool: 'select',
  view: 'planta',
  axo: false,
  unit: 'cm',
  gridOn: false,
  gridSize: 100,
  scale: 2,
  origin: { x: 0, y: 0 },
  layers: [],
  activeLayerIdx: 0,
  selectedId: null,
  strokeColor: '#000000',
  strokeWidth: 2,
  darkMode: false,
  drawing: false,
  drawPoints: [],
  drawStart: null,
  drawCurrent: null,
  panning: false,
  panStart: null,
  originStart: null,
  dimP1: null,
  lastTouchDist: null,
  lastTouchMid: null,
  moveDragStart: null,
};

// ============================================================
//  ACTION SHAPE (fallback para evitar que el diálogo se cierre)
// ============================================================
var _actionShapeId = null;
function _getActionShape() {
  var sh = getSelectedShape();
  if (sh) { _actionShapeId = sh.id; return sh; }
  if (!_actionShapeId) return null;
  for (var _li=0;_li<state.layers.length;_li++)
    for (var _si=0;_si<state.layers[_li].shapes.length;_si++)
      if (state.layers[_li].shapes[_si].id===_actionShapeId) return state.layers[_li].shapes[_si];
  return null;
}

// ============================================================
//  HISTORY
// ============================================================
var hist = { snaps: [], idx: -1, MAX: 50 };

function pushHistory() {
  var snap = JSON.parse(JSON.stringify(state.layers));
  if (hist.idx < hist.snaps.length - 1) hist.snaps.splice(hist.idx + 1);
  hist.snaps.push(snap);
  if (hist.snaps.length > hist.MAX) hist.snaps.shift();
  hist.idx = hist.snaps.length - 1;
}

function undo() {
  if (hist.idx > 0) {
    hist.idx--;
    state.layers = JSON.parse(JSON.stringify(hist.snaps[hist.idx]));
    state.selectedId = null;
    setDirty(); renderLayerPanel(); showToast('Deshacer');
  }
}

function redo() {
  if (hist.idx < hist.snaps.length - 1) {
    hist.idx++;
    state.layers = JSON.parse(JSON.stringify(hist.snaps[hist.idx]));
    state.selectedId = null;
    setDirty(); renderLayerPanel(); showToast('Rehacer');
  }
}

// ============================================================
//  CANVAS
// ============================================================
var canvas = document.getElementById('cad-canvas');
var ctx = canvas.getContext('2d');
var dirty = true;
function setDirty() { dirty = true; }

function resizeCanvas() {
  var container = document.getElementById('canvas-container');
  canvas.width = container.clientWidth;
  canvas.height = container.clientHeight;
  setDirty();
}
window.addEventListener('resize', resizeCanvas);

// ============================================================
//  COORDINATE TRANSFORMS
// ============================================================
function worldToScreen(wx, wy, wz) {
  wz = wz || 0;
  var o = state.origin, sc = state.scale;
  if (state.axo) {
    var cos30 = 0.866, sin30 = 0.5;
    // Cabinet oblique 30°: X horizontal, Y at 30° foreshortened 50%, Z vertical
    var sx = o.x + (wx + wy * cos30 * 0.5) * sc;
    var sy = o.y - (wz + wy * sin30 * 0.5) * sc;
    return { x: sx, y: sy };
  }
  if (state.view === 'frontal') return { x: o.x + wx * sc, y: o.y - wz * sc };
  if (state.view === 'lateral') return { x: o.x + wy * sc, y: o.y - wz * sc };
  return { x: o.x + wx * sc, y: o.y - wy * sc };
}

function screenToWorld(sx, sy) {
  return { x: (sx - state.origin.x) / state.scale, y: (state.origin.y - sy) / state.scale };
}

// ============================================================
//  SNAP
// ============================================================
function snapToGrid(v) {
  if (!state.gridOn) return v;
  return Math.round(v / state.gridSize) * state.gridSize;
}

function snapPoint(wx, wy) {
  var gridSnap = { x: snapToGrid(wx), y: snapToGrid(wy) };
  var threshold = 18 / state.scale;
  var bestDist = threshold, bestSnap = null;
  for (var li = 0; li < state.layers.length; li++) {
    var lyr = state.layers[li];
    if (!lyr.visible) continue;
    for (var si = 0; si < lyr.shapes.length; si++) {
      var sh = lyr.shapes[si];
      // 1. Vertex snap (highest priority — checked first, exits early if exact)
      var verts = getShapeVertices(sh);
      for (var vi = 0; vi < verts.length; vi++) {
        var v = verts[vi];
        var dv = Math.sqrt((v.x-wx)*(v.x-wx)+(v.y-wy)*(v.y-wy));
        if (dv < bestDist) { bestDist=dv; bestSnap={x:v.x,y:v.y}; }
      }
      // 2. Midpoints and nearest-point on segment
      var segs = getShapeSegments(sh);
      for (var ei = 0; ei < segs.length; ei++) {
        var s = segs[ei];
        var ax=s.x1,ay=s.y1,bx=s.x2,by=s.y2;
        // midpoint snap
        var mx=(ax+bx)*0.5, my=(ay+by)*0.5;
        var dm=Math.sqrt((mx-wx)*(mx-wx)+(my-wy)*(my-wy));
        if (dm < bestDist) { bestDist=dm; bestSnap={x:mx,y:my}; }
        // nearest point on segment
        var dx=bx-ax, dy=by-ay, lenSq=dx*dx+dy*dy;
        if (lenSq > 0) {
          var t=Math.max(0,Math.min(1,((wx-ax)*dx+(wy-ay)*dy)/lenSq));
          var px=ax+t*dx, py=ay+t*dy;
          var dp=Math.sqrt((px-wx)*(px-wx)+(py-wy)*(py-wy));
          if (dp < bestDist) { bestDist=dp; bestSnap={x:px,y:py}; }
        }
      }
    }
  }
  return bestSnap || gridSnap;
}

function getShapeSegments(sh) {
  switch(sh.type) {
    case 'rect': {
      var segs = [
        {x1:sh.x,y1:sh.y,        x2:sh.x+sh.w,y2:sh.y},
        {x1:sh.x+sh.w,y1:sh.y,   x2:sh.x+sh.w,y2:sh.y+sh.h},
        {x1:sh.x+sh.w,y1:sh.y+sh.h,x2:sh.x,   y2:sh.y+sh.h},
        {x1:sh.x,y1:sh.y+sh.h,   x2:sh.x,y2:sh.y}
      ];
      // Section divider lines as snap segments
      if (sh.sectionsV > 0) {
        var cw = sh.w/(sh.sectionsV+1);
        for (var j=1; j<=sh.sectionsV; j++) {
          var cx = sh.x + cw*j;
          segs.push({x1:cx,y1:sh.y,x2:cx,y2:sh.y+sh.h});
        }
      }
      if (sh.sectionsH > 0) {
        var rh = sh.h/(sh.sectionsH+1);
        for (var i=1; i<=sh.sectionsH; i++) {
          var ry = sh.y + rh*i;
          segs.push({x1:sh.x,y1:ry,x2:sh.x+sh.w,y2:ry});
        }
      }
      return segs;
    }
    case 'line': return [{x1:sh.x1,y1:sh.y1,x2:sh.x2,y2:sh.y2}];
    case 'polygon-free': {
      var pts=sh.points||[], pSegs=[];
      for (var pi=0;pi<pts.length-1;pi++) pSegs.push({x1:pts[pi].x,y1:pts[pi].y,x2:pts[pi+1].x,y2:pts[pi+1].y});
      if (pts.length>2) pSegs.push({x1:pts[pts.length-1].x,y1:pts[pts.length-1].y,x2:pts[0].x,y2:pts[0].y});
      return pSegs;
    }
    case 'triangle': {
      var tv=getTriangleVerts(sh); if(tv.length<3) return [];
      return [{x1:tv[0].x,y1:tv[0].y,x2:tv[1].x,y2:tv[1].y},{x1:tv[1].x,y1:tv[1].y,x2:tv[2].x,y2:tv[2].y},{x1:tv[2].x,y1:tv[2].y,x2:tv[0].x,y2:tv[0].y}];
    }
    case 'polygon-sym': {
      var pv=getShapeVertices(sh), psSegs=[];
      for (var pk=0;pk<pv.length;pk++) { var pn=(pk+1)%pv.length; psSegs.push({x1:pv[pk].x,y1:pv[pk].y,x2:pv[pn].x,y2:pv[pn].y}); }
      return psSegs;
    }
    default: return [];
  }
}

function getShapeVertices(sh) {
  switch(sh.type) {
    case 'rect': return [{x:sh.x,y:sh.y},{x:sh.x+sh.w,y:sh.y},{x:sh.x+sh.w,y:sh.y+sh.h},{x:sh.x,y:sh.y+sh.h}];
    case 'line': return [{x:sh.x1,y:sh.y1},{x:sh.x2,y:sh.y2}];
    case 'polygon-free': return sh.points || [];
    case 'circle': return [{x:sh.cx,y:sh.cy}];
    case 'oval': return [{x:sh.cx,y:sh.cy}];
    case 'triangle': return getTriangleVerts(sh);
    case 'polygon-sym': {
      var polyVerts = [], polyRot = (sh.rotation||0)*Math.PI/180;
      for (var vi2=0;vi2<sh.sides;vi2++) {
        var va = 2*Math.PI*vi2/sh.sides + polyRot;
        polyVerts.push({x:sh.cx+sh.radius*Math.cos(va), y:sh.cy+sh.radius*Math.sin(va)});
      }
      return polyVerts;
    }
    default: return [];
  }
}

function getTriangleVerts(sh) {
  var variant = sh.variant || 'equilateral';
  var x = sh.x || 0, y = sh.y || 0, base = sh.base || 100, height = sh.height || 100;
  if (variant === 'equilateral') {
    var h = base * Math.sqrt(3) / 2;
    return [{x:x,y:y},{x:x+base,y:y},{x:x+base/2,y:y+h}];
  } else if (variant === 'right') {
    return [{x:x,y:y},{x:x+base,y:y},{x:x,y:y+height}];
  } else {
    return [{x:x,y:y},{x:x+base,y:y},{x:x+base/2,y:y+height}];
  }
}

// ============================================================
//  GRID
// ============================================================
function drawGrid() {
  if (!state.gridOn) return;
  var sc = state.scale, o = state.origin, gs = state.gridSize;
  var W = canvas.width, H = canvas.height;
  var dm = state.darkMode;
  var mainColor = dm ? 'rgba(255,255,255,0.10)' : 'rgba(0,0,0,0.10)';
  var subColor  = dm ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.04)';
  var axisColor = dm ? 'rgba(255,255,255,0.22)' : 'rgba(0,0,0,0.20)';

  if (state.axo) {
    var pad = (Math.max(W,H) + Math.max(Math.abs(o.x), Math.abs(o.y))) / sc + gs*2;
    var gMin = Math.floor(-pad/gs)*gs, gMax = Math.ceil(pad/gs)*gs;
    ctx.strokeStyle = mainColor; ctx.lineWidth = 1;
    ctx.beginPath();
    for (var gy = gMin; gy <= gMax; gy += gs) {
      var wl = worldToScreen(gMin,gy), wr = worldToScreen(gMax,gy);
      ctx.moveTo(wl.x,wl.y); ctx.lineTo(wr.x,wr.y);
    }
    for (var gx = gMin; gx <= gMax; gx += gs) {
      var wb = worldToScreen(gx,gMin), wt = worldToScreen(gx,gMax);
      ctx.moveTo(wb.x,wb.y); ctx.lineTo(wt.x,wt.y);
    }
    ctx.stroke();
    ctx.strokeStyle = axisColor; ctx.lineWidth = 1.5;
    ctx.beginPath();
    var xa1=worldToScreen(gMin,0),xa2=worldToScreen(gMax,0);
    var ya1=worldToScreen(0,gMin),ya2=worldToScreen(0,gMax);
    ctx.moveTo(xa1.x,xa1.y); ctx.lineTo(xa2.x,xa2.y);
    ctx.moveTo(ya1.x,ya1.y); ctx.lineTo(ya2.x,ya2.y);
    ctx.stroke();
    return;
  }

  var subDiv = 5, subSize = gs / subDiv;
  var worldLeft   = -o.x / sc;
  var worldRight  = (W - o.x) / sc;
  var worldTop    = (o.y - H) / sc;
  var worldBottom = o.y / sc;

  // sub grid
  ctx.strokeStyle = subColor; ctx.lineWidth = 0.5;
  var startX = Math.floor(worldLeft / subSize) * subSize;
  var startY = Math.floor(worldTop  / subSize) * subSize;
  ctx.beginPath();
  for (var wx = startX; wx <= worldRight; wx += subSize) { var sx = o.x+wx*sc; ctx.moveTo(sx,0); ctx.lineTo(sx,H); }
  for (var wy = startY; wy <= worldBottom; wy += subSize) { var sy = o.y-wy*sc; ctx.moveTo(0,sy); ctx.lineTo(W,sy); }
  ctx.stroke();

  // main grid
  ctx.strokeStyle = mainColor; ctx.lineWidth = 1;
  startX = Math.floor(worldLeft / gs) * gs;
  startY = Math.floor(worldTop  / gs) * gs;
  ctx.beginPath();
  for (var wx2 = startX; wx2 <= worldRight; wx2 += gs) { var sx2 = o.x+wx2*sc; ctx.moveTo(sx2,0); ctx.lineTo(sx2,H); }
  for (var wy2 = startY; wy2 <= worldBottom; wy2 += gs) { var sy2 = o.y-wy2*sc; ctx.moveTo(0,sy2); ctx.lineTo(W,sy2); }
  ctx.stroke();

  // axes
  ctx.strokeStyle = axisColor; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(o.x,0); ctx.lineTo(o.x,H);
  ctx.moveTo(0,o.y); ctx.lineTo(W,o.y);
  ctx.stroke();
}

// ============================================================
//  SHAPE PATH BUILDER
// ============================================================
function buildPath(sh) {
  ctx.beginPath();
  switch(sh.type) {
    case 'rect': {
      var c1 = worldToScreen(sh.x, sh.y);
      var c2 = worldToScreen(sh.x+sh.w, sh.y);
      var c3 = worldToScreen(sh.x+sh.w, sh.y+sh.h);
      var c4 = worldToScreen(sh.x, sh.y+sh.h);
      ctx.moveTo(c1.x,c1.y); ctx.lineTo(c2.x,c2.y); ctx.lineTo(c3.x,c3.y); ctx.lineTo(c4.x,c4.y);
      ctx.closePath();
      break;
    }
    case 'circle': {
      var c = worldToScreen(sh.cx, sh.cy);
      ctx.arc(c.x, c.y, sh.r * state.scale, 0, Math.PI*2);
      break;
    }
    case 'oval': {
      var c2 = worldToScreen(sh.cx, sh.cy);
      ctx.ellipse(c2.x, c2.y, sh.rx*state.scale, sh.ry*state.scale, 0, 0, Math.PI*2);
      break;
    }
    case 'polygon-sym': {
      var c3 = worldToScreen(sh.cx, sh.cy);
      var r = sh.radius * state.scale;
      var sides = sh.sides || 6;
      var rot = (sh.rotation || 0) * Math.PI / 180;
      for (var i = 0; i <= sides; i++) {
        var ang = 2*Math.PI*i/sides + rot;
        var px = c3.x + r*Math.cos(ang), py = c3.y + r*Math.sin(ang);
        i===0 ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
      }
      ctx.closePath();
      break;
    }
    case 'polygon-free': {
      var pts = sh.points || [];
      if (pts.length < 2) break;
      for (var j = 0; j < pts.length; j++) {
        var s = worldToScreen(pts[j].x, pts[j].y);
        j===0 ? ctx.moveTo(s.x,s.y) : ctx.lineTo(s.x,s.y);
      }
      ctx.closePath();
      break;
    }
    case 'triangle': {
      var verts = getTriangleVerts(sh);
      for (var k = 0; k < verts.length; k++) {
        var sv = worldToScreen(verts[k].x, verts[k].y);
        k===0 ? ctx.moveTo(sv.x,sv.y) : ctx.lineTo(sv.x,sv.y);
      }
      ctx.closePath();
      break;
    }
    case 'line': {
      var lp1 = worldToScreen(sh.x1, sh.y1);
      var lp2 = worldToScreen(sh.x2, sh.y2);
      ctx.moveTo(lp1.x, lp1.y); ctx.lineTo(lp2.x, lp2.y);
      break;
    }
    default: break;
  }
}

function drawDimension(sh) {
  var p1 = worldToScreen(sh.x1, sh.y1);
  var p2 = worldToScreen(sh.x2, sh.y2);
  var offset = sh.offset || 30;
  var dx = p2.x-p1.x, dy = p2.y-p1.y;
  var len = Math.sqrt(dx*dx+dy*dy) || 1;
  var nx = -dy/len, ny = dx/len;
  var ox = nx*offset, oy = ny*offset;
  ctx.save();
  ctx.strokeStyle = '#007aff'; ctx.lineWidth = 1;
  ctx.setLineDash([4,3]);
  ctx.beginPath(); ctx.moveTo(p1.x+ox,p1.y+oy); ctx.lineTo(p2.x+ox,p2.y+oy); ctx.stroke();
  ctx.setLineDash([]);
  drawArrowHead(p1.x+ox,p1.y+oy, p2.x+ox,p2.y+oy);
  drawArrowHead(p2.x+ox,p2.y+oy, p1.x+ox,p1.y+oy);
  ctx.beginPath();
  ctx.moveTo(p1.x,p1.y); ctx.lineTo(p1.x+ox,p1.y+oy);
  ctx.moveTo(p2.x,p2.y); ctx.lineTo(p2.x+ox,p2.y+oy);
  ctx.stroke();
  var d = Math.sqrt((sh.x2-sh.x1)**2+(sh.y2-sh.y1)**2);
  var lbl = state.unit==='cm' ? (d/10).toFixed(1)+'cm' : (d/1000).toFixed(3)+'m';
  ctx.fillStyle = '#007aff';
  ctx.font = '11px -apple-system,sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(lbl, (p1.x+p2.x)/2+ox, (p1.y+p2.y)/2+oy-10);
  ctx.restore();
}

function drawArrowHead(fromX, fromY, toX, toY) {
  var ang = Math.atan2(toY-fromY, toX-fromX);
  var sz = 7;
  ctx.beginPath();
  ctx.moveTo(fromX, fromY);
  ctx.lineTo(fromX+sz*Math.cos(ang+Math.PI*0.8), fromY+sz*Math.sin(ang+Math.PI*0.8));
  ctx.moveTo(fromX, fromY);
  ctx.lineTo(fromX+sz*Math.cos(ang-Math.PI*0.8), fromY+sz*Math.sin(ang-Math.PI*0.8));
  ctx.stroke();
}

function drawShape(sh) {
  if (!sh.visible) return;
  ctx.save();
  ctx.strokeStyle = sh.strokeColor || '#000';
  ctx.lineWidth = sh.strokeWidth || 2;
  if (sh.type === 'dimension') { ctx.restore(); drawDimension(sh); return; }
  buildPath(sh);
  if (sh.fillColor && sh.fillColor !== 'none') { ctx.fillStyle = sh.fillColor; ctx.fill(); }
  ctx.stroke();
  if (sh.sectionsH > 0 || sh.sectionsV > 0 || sh.sectionsAngular > 0) drawSections(sh);
  if (sh.extruded && sh.extrudeH > 0) drawExtrusion(sh);
  if (sh.autoDim) drawAutoDim(sh);
  ctx.restore();
}

function getShapeBBox(sh) {
  switch(sh.type) {
    case 'rect': return {minX:sh.x,maxX:sh.x+sh.w,minY:sh.y,maxY:sh.y+sh.h};
    case 'circle': return {minX:sh.cx-sh.r,maxX:sh.cx+sh.r,minY:sh.cy-sh.r,maxY:sh.cy+sh.r};
    case 'oval': return {minX:sh.cx-sh.rx,maxX:sh.cx+sh.rx,minY:sh.cy-sh.ry,maxY:sh.cy+sh.ry};
    case 'line': return {minX:Math.min(sh.x1,sh.x2),maxX:Math.max(sh.x1,sh.x2),minY:Math.min(sh.y1,sh.y2),maxY:Math.max(sh.y1,sh.y2)};
    case 'polygon-free': {
      var pts=sh.points||[]; if(!pts.length) return null;
      return {minX:Math.min.apply(null,pts.map(function(p){return p.x;})),maxX:Math.max.apply(null,pts.map(function(p){return p.x;})),minY:Math.min.apply(null,pts.map(function(p){return p.y;})),maxY:Math.max.apply(null,pts.map(function(p){return p.y;}))};
    }
    case 'triangle': {
      var v=getTriangleVerts(sh);
      return {minX:Math.min.apply(null,v.map(function(p){return p.x;})),maxX:Math.max.apply(null,v.map(function(p){return p.x;})),minY:Math.min.apply(null,v.map(function(p){return p.y;})),maxY:Math.max.apply(null,v.map(function(p){return p.y;}))};
    }
    case 'polygon-sym': return {minX:sh.cx-sh.radius,maxX:sh.cx+sh.radius,minY:sh.cy-sh.radius,maxY:sh.cy+sh.radius};
    case 'dimension': return {minX:Math.min(sh.x1,sh.x2),maxX:Math.max(sh.x1,sh.x2),minY:Math.min(sh.y1,sh.y2),maxY:Math.max(sh.y1,sh.y2)};
    default: return null;
  }
}

function drawSections(sh) {
  ctx.save();
  buildPath(sh);
  ctx.clip();
  ctx.strokeStyle = sh.strokeColor || '#000';
  ctx.lineWidth = 1;
  ctx.setLineDash([5,4]);
  var bb = getShapeBBox(sh);
  if (!bb) { ctx.restore(); return; }
  var padX = (bb.maxX-bb.minX)*0.5, padY = (bb.maxY-bb.minY)*0.5;
  for (var i = 1; i <= sh.sectionsH; i++) {
    var wy = bb.minY + (bb.maxY-bb.minY)*i/(sh.sectionsH+1);
    var p1 = worldToScreen(bb.minX-padX,wy), p2 = worldToScreen(bb.maxX+padX,wy);
    ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y); ctx.stroke();
  }
  for (var j = 1; j <= sh.sectionsV; j++) {
    var wx = bb.minX + (bb.maxX-bb.minX)*j/(sh.sectionsV+1);
    var p3 = worldToScreen(wx,bb.minY-padY), p4 = worldToScreen(wx,bb.maxY+padY);
    ctx.beginPath(); ctx.moveTo(p3.x,p3.y); ctx.lineTo(p4.x,p4.y); ctx.stroke();
  }
  if (sh.sectionsAngular > 0 && (sh.type==='circle'||sh.type==='oval'||sh.type==='polygon-sym')) {
    var cx = sh.cx, cy = sh.cy;
    var rPx = (sh.r||sh.rx||sh.radius||50)*state.scale*1.5;
    var cScr = worldToScreen(cx,cy);
    for (var k = 0; k < sh.sectionsAngular; k++) {
      var ang = Math.PI*k/sh.sectionsAngular;
      ctx.beginPath();
      ctx.moveTo(cScr.x+rPx*Math.cos(ang), cScr.y+rPx*Math.sin(ang));
      ctx.lineTo(cScr.x-rPx*Math.cos(ang), cScr.y-rPx*Math.sin(ang));
      ctx.stroke();
    }
  }
  ctx.restore();
}

function drawExtrusion(sh) {
  ctx.save();
  ctx.strokeStyle = sh.strokeColor || '#000';
  ctx.lineWidth = sh.strokeWidth || 2;
  ctx.globalAlpha = 0.5;
  var verts = getShapeVertices(sh);
  var eh = sh.extrudeH;
  for (var i = 0; i < verts.length; i++) {
    var bot = worldToScreen(verts[i].x, verts[i].y, 0);
    var top = worldToScreen(verts[i].x, verts[i].y, eh);
    ctx.beginPath(); ctx.moveTo(bot.x,bot.y); ctx.lineTo(top.x,top.y); ctx.stroke();
  }
  if (verts.length >= 2) {
    ctx.beginPath();
    for (var j = 0; j < verts.length; j++) {
      var s = worldToScreen(verts[j].x, verts[j].y, eh);
      j===0 ? ctx.moveTo(s.x,s.y) : ctx.lineTo(s.x,s.y);
    }
    if (sh.type !== 'line') ctx.closePath();
    ctx.stroke();
  }
  ctx.restore();
}

function drawAutoDim(sh) {
  var bb = getShapeBBox(sh); if (!bb) return;
  var off = 28;
  ctx.save();
  ctx.strokeStyle = '#007aff'; ctx.fillStyle = '#007aff';
  ctx.lineWidth = 1; ctx.font = '11px -apple-system,sans-serif';
  function fmtW(w) { return state.unit==='cm' ? (w/10).toFixed(1)+'cm' : (w/1000).toFixed(3)+'m'; }

  var totalW = bb.maxX-bb.minX, totalH = bb.maxY-bb.minY;

  // ── Overall width (below) ──
  var p1s = worldToScreen(bb.minX,bb.minY), p2s = worldToScreen(bb.maxX,bb.minY);
  var dimYBase = Math.max(worldToScreen(bb.minX,bb.maxY).y, worldToScreen(bb.maxX,bb.maxY).y) + off;
  ctx.setLineDash([3,3]);
  ctx.beginPath(); ctx.moveTo(p1s.x,dimYBase); ctx.lineTo(p2s.x,dimYBase); ctx.stroke();
  ctx.setLineDash([]);
  ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.fillText(fmtW(totalW), (p1s.x+p2s.x)/2, dimYBase+2);

  // ── Column widths (below overall, one label per column) ──
  if (sh.sectionsV > 0) {
    var colW = totalW/(sh.sectionsV+1);
    var secLineY = dimYBase+18;
    ctx.font = '10px -apple-system,sans-serif';
    for (var j=0; j<=sh.sectionsV; j++) {
      var cxL = bb.minX + colW*j, cxR = cxL + colW;
      var csL = worldToScreen(cxL,bb.maxY), csR = worldToScreen(cxR,bb.maxY);
      ctx.setLineDash([2,2]);
      ctx.beginPath(); ctx.moveTo(csL.x,secLineY-2); ctx.lineTo(csR.x,secLineY-2); ctx.stroke();
      ctx.setLineDash([]);
      // tick marks at edges
      ctx.beginPath(); ctx.moveTo(csL.x,secLineY-5); ctx.lineTo(csL.x,secLineY+1); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(csR.x,secLineY-5); ctx.lineTo(csR.x,secLineY+1); ctx.stroke();
      ctx.textAlign='center'; ctx.textBaseline='top';
      ctx.fillText(fmtW(colW), (csL.x+csR.x)/2, secLineY+2);
    }
    ctx.font = '11px -apple-system,sans-serif';
  }

  // ── Overall height (right) ──
  var p3s = worldToScreen(bb.maxX,bb.minY), p4s = worldToScreen(bb.maxX,bb.maxY);
  var dimXBase = Math.max(p3s.x,p4s.x) + off;
  ctx.setLineDash([3,3]);
  ctx.beginPath(); ctx.moveTo(dimXBase,p3s.y); ctx.lineTo(dimXBase,p4s.y); ctx.stroke();
  ctx.setLineDash([]);
  ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.fillText(fmtW(totalH), dimXBase+2, (p3s.y+p4s.y)/2);

  // ── Row heights (right of overall, one label per row) ──
  if (sh.sectionsH > 0) {
    var rowH = totalH/(sh.sectionsH+1);
    var secLineX = dimXBase+48;
    ctx.font = '10px -apple-system,sans-serif';
    for (var i=0; i<=sh.sectionsH; i++) {
      var ryT = bb.minY + rowH*i, ryB = ryT + rowH;
      var rsT = worldToScreen(bb.maxX,ryT), rsB = worldToScreen(bb.maxX,ryB);
      ctx.setLineDash([2,2]);
      ctx.beginPath(); ctx.moveTo(secLineX-2,rsT.y); ctx.lineTo(secLineX-2,rsB.y); ctx.stroke();
      ctx.setLineDash([]);
      ctx.beginPath(); ctx.moveTo(secLineX-5,rsT.y); ctx.lineTo(secLineX+1,rsT.y); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(secLineX-5,rsB.y); ctx.lineTo(secLineX+1,rsB.y); ctx.stroke();
      ctx.textAlign='left'; ctx.textBaseline='middle';
      ctx.fillText(fmtW(rowH), secLineX+2, (rsT.y+rsB.y)/2);
    }
    ctx.font = '11px -apple-system,sans-serif';
  }

  ctx.restore();
}

function drawSelectionHandles(sh) {
  if (!sh) return;
  ctx.save();
  ctx.strokeStyle = '#007aff'; ctx.lineWidth = 1.5;
  ctx.setLineDash([5,3]);
  buildPath(sh);
  ctx.stroke();
  ctx.setLineDash([]);

  var handlePts;
  if (sh.extruded && sh.extrudeH > 0 && sh.type !== 'line' && sh.type !== 'dimension') {
    var eb = _getExtrudedScreenBBox(sh);
    if (eb.minX < Infinity) {
      // Draw dashed bounding rect around full 3D volume
      ctx.setLineDash([5,3]);
      ctx.beginPath(); ctx.rect(eb.minX-4,eb.minY-4,eb.maxX-eb.minX+8,eb.maxY-eb.minY+8); ctx.stroke();
      ctx.setLineDash([]);
      handlePts = [
        {x:eb.minX,y:eb.minY},{x:eb.maxX,y:eb.minY},
        {x:eb.maxX,y:eb.maxY},{x:eb.minX,y:eb.maxY}
      ];
    }
  }
  if (!handlePts) {
    var bb = getShapeBBox(sh); if (!bb) { ctx.restore(); return; }
    handlePts = [
      worldToScreen(bb.minX,bb.minY), worldToScreen(bb.maxX,bb.minY),
      worldToScreen(bb.maxX,bb.maxY), worldToScreen(bb.minX,bb.maxY)
    ];
  }
  ctx.fillStyle = '#fff'; ctx.strokeStyle = '#007aff'; ctx.lineWidth = 1.5;
  for (var i = 0; i < handlePts.length; i++) {
    ctx.beginPath(); ctx.arc(handlePts[i].x,handlePts[i].y,5,0,Math.PI*2); ctx.fill(); ctx.stroke();
  }
  ctx.restore();
}

function drawInProgress() {
  var cur = state.drawCurrent;
  if (state.tool === 'polygon-free' && state.drawPoints.length > 0) {
    ctx.save();
    ctx.strokeStyle = state.strokeColor; ctx.lineWidth = state.strokeWidth;
    ctx.setLineDash([5,3]);
    ctx.beginPath();
    var s0 = worldToScreen(state.drawPoints[0].x, state.drawPoints[0].y);
    ctx.moveTo(s0.x, s0.y);
    for (var i = 1; i < state.drawPoints.length; i++) {
      var si = worldToScreen(state.drawPoints[i].x, state.drawPoints[i].y);
      ctx.lineTo(si.x, si.y);
    }
    if (cur) { var sc2 = worldToScreen(cur.x,cur.y); ctx.lineTo(sc2.x,sc2.y); }
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#007aff';
    for (var j = 0; j < state.drawPoints.length; j++) {
      var sp = worldToScreen(state.drawPoints[j].x, state.drawPoints[j].y);
      ctx.beginPath(); ctx.arc(sp.x,sp.y,4,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
    return;
  }
  if (!state.drawing && !state.dimP1) return;
  if (!cur) return;
  ctx.save();
  ctx.strokeStyle = state.strokeColor; ctx.lineWidth = state.strokeWidth;
  ctx.setLineDash([5,3]);
  if (state.tool === 'line' && state.drawStart) {
    var lp1 = worldToScreen(state.drawStart.x, state.drawStart.y);
    var lp2 = worldToScreen(cur.x, cur.y);
    ctx.beginPath(); ctx.moveTo(lp1.x,lp1.y); ctx.lineTo(lp2.x,lp2.y); ctx.stroke();
  } else if (state.tool === 'dimension' && state.dimP1) {
    var dp1 = worldToScreen(state.dimP1.x, state.dimP1.y);
    var dp2 = worldToScreen(cur.x, cur.y);
    ctx.strokeStyle = '#007aff';
    ctx.beginPath(); ctx.moveTo(dp1.x,dp1.y); ctx.lineTo(dp2.x,dp2.y); ctx.stroke();
  }
  // Snap indicator: yellow circle at current snap point
  ctx.setLineDash([]);
  var snapScr = worldToScreen(cur.x, cur.y);
  ctx.strokeStyle = '#ffcc00'; ctx.fillStyle = 'rgba(255,204,0,0.25)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(snapScr.x,snapScr.y,7,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.restore();
}

// ============================================================
//  MAIN RENDER LOOP
// ============================================================
function render() {
  if (dirty) {
    dirty = false;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = state.darkMode ? '#1a1a1a' : '#f8f8f8';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    drawGrid();
    for (var li = 0; li < state.layers.length; li++) {
      var layer = state.layers[li];
      if (!layer.visible) continue;
      ctx.save();
      ctx.globalAlpha = typeof layer.opacity === 'number' ? layer.opacity : 1;
      for (var si = 0; si < layer.shapes.length; si++) drawShape(layer.shapes[si]);
      ctx.restore();
    }
    var sel = getSelectedShape();
    if (sel) drawSelectionHandles(sel);
    drawInProgress();
    updateShapeActionsPos();
  }
  requestAnimationFrame(render);
}

function getSelectedShape() {
  if (!state.selectedId) return null;
  for (var li = 0; li < state.layers.length; li++) {
    for (var si = 0; si < state.layers[li].shapes.length; si++) {
      if (state.layers[li].shapes[si].id === state.selectedId) return state.layers[li].shapes[si];
    }
  }
  return null;
}

function findShapeAt(sx, sy) {
  for (var li = state.layers.length-1; li >= 0; li--) {
    var layer = state.layers[li];
    if (!layer.visible) continue;
    for (var si = layer.shapes.length-1; si >= 0; si--) {
      if (isPointInShape(sx, sy, layer.shapes[si])) return layer.shapes[si];
    }
  }
  return null;
}

function _getExtrudedScreenBBox(sh) {
  var verts = getShapeVertices(sh), eh = sh.extrudeH || 0;
  var mnX=Infinity,mxX=-Infinity,mnY=Infinity,mxY=-Infinity;
  for (var k=0;k<verts.length;k++) {
    var b=worldToScreen(verts[k].x,verts[k].y,0), t=worldToScreen(verts[k].x,verts[k].y,eh);
    mnX=Math.min(mnX,b.x,t.x); mxX=Math.max(mxX,b.x,t.x);
    mnY=Math.min(mnY,b.y,t.y); mxY=Math.max(mxY,b.y,t.y);
  }
  return {minX:mnX,maxX:mxX,minY:mnY,maxY:mxY};
}

function isPointInShape(sx, sy, sh) {
  var thr = Math.max(8, (sh.strokeWidth||2) * 0.5 + 6);
  // For extruded shapes: hit-test against the full 3D volume in screen space
  if (sh.extruded && sh.extrudeH > 0 && sh.type !== 'line' && sh.type !== 'dimension') {
    var eb = _getExtrudedScreenBBox(sh);
    if (eb.minX < Infinity) return sx>=eb.minX-thr && sx<=eb.maxX+thr && sy>=eb.minY-thr && sy<=eb.maxY+thr;
  }
  switch(sh.type) {
    case 'rect': {
      var p1=worldToScreen(sh.x,sh.y), p2=worldToScreen(sh.x+sh.w,sh.y+sh.h);
      return sx>=Math.min(p1.x,p2.x)-thr && sx<=Math.max(p1.x,p2.x)+thr && sy>=Math.min(p1.y,p2.y)-thr && sy<=Math.max(p1.y,p2.y)+thr;
    }
    case 'circle': {
      var c=worldToScreen(sh.cx,sh.cy); var r=sh.r*state.scale;
      return Math.sqrt((sx-c.x)**2+(sy-c.y)**2) <= r+thr;
    }
    case 'oval': {
      var c2=worldToScreen(sh.cx,sh.cy); var rx=sh.rx*state.scale, ry=sh.ry*state.scale;
      return ((sx-c2.x)/rx)**2+((sy-c2.y)/ry)**2 <= 1.4;
    }
    case 'line': {
      var lp1=worldToScreen(sh.x1,sh.y1), lp2=worldToScreen(sh.x2,sh.y2);
      return distSeg(sx,sy,lp1.x,lp1.y,lp2.x,lp2.y) < thr;
    }
    case 'polygon-free': {
      var pts=sh.points||[]; if(pts.length<2) return false;
      for (var i=0;i<pts.length-1;i++) {
        var a=worldToScreen(pts[i].x,pts[i].y), b=worldToScreen(pts[i+1].x,pts[i+1].y);
        if (distSeg(sx,sy,a.x,a.y,b.x,b.y)<thr) return true;
      }
      if (pts.length>2) {
        var a2=worldToScreen(pts[pts.length-1].x,pts[pts.length-1].y), b2=worldToScreen(pts[0].x,pts[0].y);
        if (distSeg(sx,sy,a2.x,a2.y,b2.x,b2.y)<thr) return true;
      }
      return false;
    }
    case 'triangle': case 'polygon-sym': {
      var bb=getShapeBBox(sh); if(!bb) return false;
      var p1b=worldToScreen(bb.minX,bb.minY), p2b=worldToScreen(bb.maxX,bb.maxY);
      return sx>=Math.min(p1b.x,p2b.x)-thr && sx<=Math.max(p1b.x,p2b.x)+thr && sy>=Math.min(p1b.y,p2b.y)-thr && sy<=Math.max(p1b.y,p2b.y)+thr;
    }
    case 'dimension': {
      var dp1=worldToScreen(sh.x1,sh.y1), dp2=worldToScreen(sh.x2,sh.y2);
      return distSeg(sx,sy,dp1.x,dp1.y,dp2.x,dp2.y) < thr+10;
    }
    default: return false;
  }
}

function distSeg(px,py,ax,ay,bx,by) {
  var dx=bx-ax, dy=by-ay;
  var len2=dx*dx+dy*dy;
  if (len2===0) return Math.sqrt((px-ax)**2+(py-ay)**2);
  var t=Math.max(0,Math.min(1,((px-ax)*dx+(py-ay)*dy)/len2));
  return Math.sqrt((px-(ax+t*dx))**2+(py-(ay+t*dy))**2);
}

// ============================================================
//  POINTER EVENTS
// ============================================================
var spaceDown = false;
var activePointers = {};

document.addEventListener('keydown', function(e) {
  if (e.code==='Space' && e.target===document.body) { e.preventDefault(); spaceDown=true; canvas.classList.add('cursor-grab'); }
  if (e.code==='KeyZ' && (e.metaKey||e.ctrlKey)) { e.preventDefault(); e.shiftKey?redo():undo(); }
  if (e.code==='Escape') {
    if (state.tool==='polygon-free' && state.drawPoints.length>=3) finalizePolygonFree();
    else { state.drawPoints=[]; state.drawCurrent=null; }
    state.selectedId=null; state.drawing=false; state.drawStart=null; state.dimP1=null;
    hideShapeActions(); setDirty();
  }
  if ((e.code==='Delete'||e.code==='Backspace') && e.target===document.body) {
    if (state.selectedId) { e.preventDefault(); deleteSelectedShape(); }
  }
});
document.addEventListener('keyup', function(e) {
  if (e.code==='Space') { spaceDown=false; canvas.classList.remove('cursor-grab'); canvas.classList.remove('cursor-grabbing'); }
});

canvas.addEventListener('pointerdown', onPointerDown, {passive:false});
canvas.addEventListener('pointermove', onPointerMove, {passive:false});
canvas.addEventListener('pointerup', onPointerUp);
canvas.addEventListener('pointercancel', onPointerUp);
canvas.addEventListener('wheel', onWheel, {passive:false});
canvas.addEventListener('dblclick', onDblClick);
canvas.addEventListener('contextmenu', function(e){ e.preventDefault(); });

function getCanvasXY(e) {
  var rect = canvas.getBoundingClientRect();
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

function onPointerDown(e) {
  e.preventDefault();
  canvas.setPointerCapture(e.pointerId);
  activePointers[e.pointerId] = { x: e.clientX, y: e.clientY };
  var pCount = Object.keys(activePointers).length;
  if (pCount >= 2) {
    // Cancelar cualquier acción pendiente del primer dedo
    clearTimeout(window._shapeTapTimer); window._shapeTapTimer = null;
    state.drawing = false; state.drawStart = null; state.dimP1 = null;
    // Revertir punto polygon-free que el primer dedo pudo haber añadido
    if (state.tool === 'polygon-free' && state.drawPoints.length > 0) {
      state.drawPoints.pop(); state.drawCurrent = null; setDirty();
    }
    var pts = Object.values(activePointers);
    state.lastTouchDist = Math.hypot(pts[1].x-pts[0].x, pts[1].y-pts[0].y);
    state.lastTouchMid = { x:(pts[0].x+pts[1].x)/2, y:(pts[0].y+pts[1].y)/2 };
    state.panning = false; return;
  }
  var cxy = getCanvasXY(e);
  var wp = screenToWorld(cxy.x, cxy.y);
  if (spaceDown || e.button===1) {
    state.panning=true; state.panStart={x:e.clientX,y:e.clientY}; state.originStart={...state.origin};
    canvas.classList.add('cursor-grabbing'); return;
  }
  var tool = state.tool;
  var snapped = snapPoint(wp.x, wp.y);
  if (tool==='select') {
    var sh = findShapeAt(cxy.x, cxy.y);
    if (sh) { state.selectedId=sh.id; showShapeActions(); }
    else { state.selectedId=null; hideShapeActions(); }
    setDirty(); return;
  }
  if (tool==='move') {
    var sh2 = findShapeAt(cxy.x, cxy.y);
    if (sh2 && !sh2.locked) { state.selectedId=sh2.id; state.drawing=true; state.moveDragStart=snapped; }
    setDirty(); return;
  }
  if (tool==='line') {
    state.drawing=true; state.drawStart=snapped; state.drawCurrent=snapped; setDirty(); return;
  }
  if (tool==='dimension') {
    if (!state.dimP1) { state.dimP1=snapped; }
    else {
      pushHistory();
      addShapeToActiveLayer({
        id:genUUID(),type:'dimension',name:'Cota',visible:true,locked:false,
        strokeColor:'#007aff',strokeWidth:1,fillColor:'none',
        x1:state.dimP1.x,y1:state.dimP1.y,x2:snapped.x,y2:snapped.y,offset:30,
        extruded:false,extrudeH:0,sectionsH:0,sectionsV:0,sectionsAngular:0,autoDim:false
      });
      state.dimP1=null; state.drawCurrent=null;
    }
    setDirty(); return;
  }
  if (tool==='polygon-free') {
    state.drawPoints.push(snapped); state.drawCurrent=snapped; setDirty(); return;
  }
  if (['rect','circle','oval','polygon-sym','triangle'].includes(tool)) {
    var _tl=tool, _tp={x:snapped.x,y:snapped.y};
    clearTimeout(window._shapeTapTimer);
    window._shapeTapTimer = setTimeout(function() {
      window._shapeTapTimer = null;
      openShapeDialog(_tl, _tp);
    }, 90);
    return;
  }
  if (tool==='section') {
    var sh3=findShapeAt(cxy.x,cxy.y);
    if (sh3) {
      var _s3id=sh3.id;
      clearTimeout(window._shapeTapTimer);
      window._shapeTapTimer = setTimeout(function() {
        window._shapeTapTimer = null;
        state.selectedId=_s3id; openSectionDialog();
      }, 90);
    }
    return;
  }
  if (tool==='extrude') {
    var sh4=findShapeAt(cxy.x,cxy.y);
    if (sh4) {
      var _s4id=sh4.id;
      clearTimeout(window._shapeTapTimer);
      window._shapeTapTimer = setTimeout(function() {
        window._shapeTapTimer = null;
        state.selectedId=_s4id; openExtrudeDialog();
      }, 90);
    }
    return;
  }
}

function onPointerMove(e) {
  e.preventDefault();
  activePointers[e.pointerId] = {x:e.clientX,y:e.clientY};
  var pCount = Object.keys(activePointers).length;
  var cxy = getCanvasXY(e);
  var wp = screenToWorld(cxy.x, cxy.y);
  var displayX = state.unit==='cm' ? (wp.x/10).toFixed(1) : (wp.x/1000).toFixed(3);
  var displayY = state.unit==='cm' ? (wp.y/10).toFixed(1) : (wp.y/1000).toFixed(3);
  document.getElementById('coords-display').textContent = displayX+', '+displayY+' '+state.unit;
  if (pCount>=2) {
    var pts=Object.values(activePointers);
    var dist=Math.hypot(pts[1].x-pts[0].x,pts[1].y-pts[0].y);
    var mid={x:(pts[0].x+pts[1].x)/2,y:(pts[0].y+pts[1].y)/2};
    if (state.lastTouchDist!==null) {
      var ratio=dist/state.lastTouchDist;
      var rect=canvas.getBoundingClientRect();
      zoomAround(mid.x-rect.left,mid.y-rect.top,ratio);
      if (state.lastTouchMid) { state.origin.x+=mid.x-state.lastTouchMid.x; state.origin.y+=mid.y-state.lastTouchMid.y; }
    }
    state.lastTouchDist=dist; state.lastTouchMid=mid; setDirty(); return;
  }
  if (state.panning) {
    state.origin.x=state.originStart.x+(e.clientX-state.panStart.x);
    state.origin.y=state.originStart.y+(e.clientY-state.panStart.y);
    setDirty(); return;
  }
  var snapped=snapPoint(wp.x,wp.y);
  state.drawCurrent=snapped;
  if (state.tool==='move' && state.drawing && state.selectedId) {
    var sh=getSelectedShape(); if(!sh||sh.locked) return;
    var dx=snapped.x-state.moveDragStart.x, dy=snapped.y-state.moveDragStart.y;
    moveShape(sh,dx,dy); state.moveDragStart=snapped;
  }
  setDirty();
}

function onPointerUp(e) {
  try { canvas.releasePointerCapture(e.pointerId); } catch(_){}
  delete activePointers[e.pointerId];
  var pCount=Object.keys(activePointers).length;
  if (pCount<2) { state.lastTouchDist=null; state.lastTouchMid=null; }
  if (state.panning) { state.panning=false; canvas.classList.remove('cursor-grabbing'); return; }
  var tool=state.tool;
  if (tool==='line' && state.drawing) {
    var s=state.drawStart, c=state.drawCurrent;
    if (s&&c&&(Math.abs(c.x-s.x)>0.5||Math.abs(c.y-s.y)>0.5)) {
      pushHistory();
      addShapeToActiveLayer({
        id:genUUID(),type:'line',name:'Línea '+(countShapes()+1),
        visible:true,locked:false,strokeColor:state.strokeColor,strokeWidth:state.strokeWidth,fillColor:'none',
        x1:s.x,y1:s.y,x2:c.x,y2:c.y,
        extruded:false,extrudeH:0,sectionsH:0,sectionsV:0,sectionsAngular:0,autoDim:false
      });
    }
    state.drawing=false; state.drawStart=null; setDirty(); return;
  }
  if (tool==='move' && state.drawing) { state.drawing=false; pushHistory(); setDirty(); return; }
}

function onDblClick(e) {
  if (state.tool==='polygon-free' && state.drawPoints.length>=3) finalizePolygonFree();
}

function finalizePolygonFree() {
  if (state.drawPoints.length<3) { state.drawPoints=[]; state.drawCurrent=null; setDirty(); return; }
  pushHistory();
  addShapeToActiveLayer({
    id:genUUID(),type:'polygon-free',name:'Polígono '+(countShapes()+1),
    visible:true,locked:false,strokeColor:state.strokeColor,strokeWidth:state.strokeWidth,fillColor:'none',
    points:state.drawPoints.slice(),
    extruded:false,extrudeH:0,sectionsH:0,sectionsV:0,sectionsAngular:0,autoDim:false
  });
  state.drawPoints=[]; state.drawCurrent=null; setDirty();
}

function onWheel(e) {
  e.preventDefault();
  var delta = e.deltaY;
  if (e.deltaMode === 1) delta *= 20;
  else if (e.deltaMode === 2) delta *= 400;
  var cxy=getCanvasXY(e);
  zoomAround(cxy.x, cxy.y, delta<0?1.12:1/1.12);
}

function zoomAround(sx, sy, factor) {
  var newSc=Math.min(50,Math.max(0.01,state.scale*factor));
  var af=newSc/state.scale;
  state.origin.x=sx+(state.origin.x-sx)*af;
  state.origin.y=sy+(state.origin.y-sy)*af;
  state.scale=newSc; setDirty();
}

// ============================================================
//  SHAPE HELPERS
// ============================================================
function addShapeToActiveLayer(sh) {
  ensureLayer();
  state.layers[state.activeLayerIdx].shapes.push(sh);
  setDirty(); renderLayerPanel();
}

function ensureLayer() {
  if (!state.layers.length) {
    state.layers.push({id:genUUID(),name:'Capa 1',visible:true,locked:false,opacity:1,shapes:[]});
    state.activeLayerIdx=0;
  }
}

function countShapes() {
  var c=0; for (var i=0;i<state.layers.length;i++) c+=state.layers[i].shapes.length; return c;
}

function moveShape(sh, dx, dy) {
  switch(sh.type) {
    case 'rect': sh.x+=dx; sh.y+=dy; break;
    case 'circle': sh.cx+=dx; sh.cy+=dy; break;
    case 'oval': sh.cx+=dx; sh.cy+=dy; break;
    case 'polygon-sym': sh.cx+=dx; sh.cy+=dy; break;
    case 'polygon-free': sh.points=sh.points.map(function(p){return{x:p.x+dx,y:p.y+dy};}); break;
    case 'triangle': sh.x+=dx; sh.y+=dy; break;
    case 'line': sh.x1+=dx;sh.y1+=dy;sh.x2+=dx;sh.y2+=dy; break;
    case 'dimension': sh.x1+=dx;sh.y1+=dy;sh.x2+=dx;sh.y2+=dy; break;
  }
}

function selectTool(tool) {
  if (state.tool==='polygon-free' && tool!=='polygon-free' && state.drawPoints.length>=3) finalizePolygonFree();
  state.tool=tool; state.drawing=false; state.drawStart=null; state.drawCurrent=null;
  state.drawPoints=[]; state.dimP1=null;
  document.querySelectorAll('.tool-btn').forEach(function(btn){ btn.classList.toggle('active',btn.dataset.tool===tool); });
  canvas.className='';
  if (tool==='move') canvas.classList.add('cursor-move');
  else if (tool==='select') canvas.classList.add('cursor-default');
  else canvas.classList.add('cursor-crosshair');
  setDirty();
}

}

  addShapeToActiveLayer({

function confirmCircle(px,py) {

function confirmOval(px,py) {

function confirmTriangle(px,py) {

function applyEdit(shId) {
  var sh=null;
  for (var li=0;li<state.layers.length;li++) for (var si=0;si<state.layers[li].shapes.length;si++) if (state.layers[li].shapes[si].id===shId) sh=state.layers[li].shapes[si];
  if (!sh) { closeModal(); return; }
  pushHistory();
  var ni=document.getElementById('e-name'); if(ni) sh.name=ni.value;
  var ci=document.getElementById('e-color'); if(ci) sh.strokeColor=ci.value;
  var sti=document.getElementById('e-stroke'); if(sti) sh.strokeWidth=parseInt(sti.value)||2;
  var adi=document.getElementById('e-autodim'); if(adi) sh.autoDim=adi.checked;
  if (sh.type==='rect') { sh.w=toMM(document.getElementById('e-w').value); sh.h=toMM(document.getElementById('e-h').value); }
  else if (sh.type==='circle') { sh.r=toMM(document.getElementById('e-r').value); }
  else if (sh.type==='oval') { sh.rx=toMM(document.getElementById('e-rx').value); sh.ry=toMM(document.getElementById('e-ry').value); }
  else if (sh.type==='polygon-sym') { sh.sides=parseInt(document.getElementById('e-sides').value); sh.radius=toMM(document.getElementById('e-radius').value); sh.rotation=parseFloat(document.getElementById('e-rot').value)||0; }
  else if (sh.type==='triangle') { sh.base=toMM(document.getElementById('e-base').value); sh.height=toMM(document.getElementById('e-height').value); }
  closeModal(); setDirty(); showToast('Forma actualizada');
}

function showShapeActions() {
  var bar=document.getElementById('shape-actions');
  var sh=getSelectedShape();
  if (sh) _actionShapeId = sh.id;
  var canRotate = sh && (sh.type==='polygon-sym'||sh.type==='triangle');
  document.querySelectorAll('.sa-rotate').forEach(function(b){ b.style.display=canRotate?'':'none'; });
  bar.style.display='flex'; updateShapeActionsPos();
}

function hideShapeActions() {
  document.getElementById('shape-actions').style.display='none';
}

function updateShapeActionsPos() {
  var bar=document.getElementById('shape-actions');
  if (bar.style.display==='none'||!state.selectedId) return;
  var sh=getSelectedShape(); if (!sh) { hideShapeActions(); return; }
  var bb=getShapeBBox(sh); if (!bb) return;
  var topSc=worldToScreen(bb.minX, bb.maxY);
  var barW=bar.offsetWidth||240;
  var container=document.getElementById('canvas-container');
  var cw=container.clientWidth;
  var left=Math.max(8,topSc.x-barW/2);
  var top=Math.max(60,topSc.y-52);
  if (left+barW>cw-8) left=cw-barW-8;
  bar.style.left=left+'px'; bar.style.top=top+'px';
}

function deleteSelectedShape() {
  if (!state.selectedId) return;
  pushHistory();
  for (var li=0;li<state.layers.length;li++) {
    var idx=state.layers[li].shapes.findIndex(function(s){return s.id===state.selectedId;});
    if (idx!==-1) { state.layers[li].shapes.splice(idx,1); break; }
  }
  state.selectedId=null; hideShapeActions(); setDirty(); renderLayerPanel(); showToast('Figura eliminada');
}

// ============================================================
//  LAYER PANEL
// ============================================================
function toggleLayerPanel() {
  document.getElementById('layer-panel').classList.toggle('open');
}

function addLayer() {
  ensureLayer();
  var idx=state.layers.length;
  state.layers.push({id:genUUID(),name:'Capa '+(idx+1),visible:true,locked:false,opacity:1,shapes:[]});
  state.activeLayerIdx=idx; renderLayerPanel(); setDirty();
}

function renderLayerPanel() {
  var list=document.getElementById('layer-list');
  list.innerHTML='';
  for (var i=state.layers.length-1;i>=0;i--) {
    (function(idx){
      var layer=state.layers[idx];
      var row=document.createElement('div');
      row.className='layer-row'+(idx===state.activeLayerIdx?' active':'');
      row.onclick=function(){ state.activeLayerIdx=idx; renderLayerPanel(); };
      row.innerHTML=
        '<button class="layer-icon-btn'+(layer.visible?'':' muted')+'" title="'+(layer.visible?'Ocultar':'Mostrar')+'" onclick="event.stopPropagation();toggleLayerVisible('+idx+')">'+
        '<i class="ph '+(layer.visible?'ph-eye':'ph-eye-slash')+'"></i></button>'+
        '<button class="layer-icon-btn'+(layer.locked?' muted':'')+'" title="'+(layer.locked?'Desbloquear':'Bloquear')+'" onclick="event.stopPropagation();toggleLayerLock('+idx+')">'+
        '<i class="ph '+(layer.locked?'ph-lock':'ph-lock-open')+'"></i></button>'+
        '<input class="layer-name-inp" value="'+layer.name+'" onclick="event.stopPropagation()" '+
        'onchange="renameLayer('+idx+',this.value)" onblur="renameLayer('+idx+',this.value)">'+
        '<button class="layer-del-btn" title="Eliminar" onclick="event.stopPropagation();deleteLayer('+idx+')">'+
        '<i class="ph ph-trash"></i></button>';
      list.appendChild(row);
    })(i);
  }
}

function toggleLayerVisible(i) { state.layers[i].visible=!state.layers[i].visible; renderLayerPanel(); setDirty(); }
function toggleLayerLock(i) { state.layers[i].locked=!state.layers[i].locked; renderLayerPanel(); }
function renameLayer(i,name) { state.layers[i].name=name; }

function deleteLayer(i) {
  if (state.layers.length<=1) { showToast('Debe haber al menos una capa'); return; }
  pushHistory(); state.layers.splice(i,1);
  if (state.activeLayerIdx>=state.layers.length) state.activeLayerIdx=state.layers.length-1;
  renderLayerPanel(); setDirty();
}

// ============================================================
//  SAVE POPOVER
// ============================================================
function toggleSavePopover() {
  document.getElementById('save-popover').classList.toggle('hidden');
}
document.addEventListener('click', function(e) {
  var wrap=document.querySelector('.save-wrap');
  if (wrap&&!wrap.contains(e.target)) document.getElementById('save-popover').classList.add('hidden');
});

function _drawCleanCanvas() {
  var prevDark = state.darkMode, prevGrid = state.gridOn, prevSel = state.selectedId;
  state.darkMode = false; state.gridOn = false; state.selectedId = null;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = '#ffffff'; ctx.fillRect(0,0,canvas.width,canvas.height);
  for (var _li=0; _li<state.layers.length; _li++) {
    if (!state.layers[_li].visible) continue;
    ctx.save();
    ctx.globalAlpha = typeof state.layers[_li].opacity==='number' ? state.layers[_li].opacity : 1;
    for (var _si=0; _si<state.layers[_li].shapes.length; _si++) drawShape(state.layers[_li].shapes[_si]);
    ctx.restore();
  }
  var dataUrl = canvas.toDataURL('image/png');
  state.darkMode = prevDark; state.gridOn = prevGrid; state.selectedId = prevSel; setDirty();
  return dataUrl;
}

function saveAsImageClean() {
  document.getElementById('save-popover').classList.add('hidden');
  var dataUrl = _drawCleanCanvas();
  var a = document.createElement('a');
  a.href = dataUrl; a.download = 'rubik-cad.png';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  showToast('Imagen guardada ✓');
}

function saveToProduccion() {
  document.getElementById('save-popover').classList.add('hidden');
  if (!fbDb||!CLIENT_ID||!PROJECT_ID) { showToast('Configura el proyecto primero'); return; }
  fbDb.ref('proyectos/'+CLIENT_ID+'/'+PROJECT_ID+'/presupuesto/items').once('value').then(function(snap) {
    if (!snap.exists()) { showToast('No hay ítems en el presupuesto'); return; }
    var allItems = [];
    snap.forEach(function(child) {
      var it = child.val();
      if (it && it.type !== 'chapter' && it.desc) allItems.push({key: child.key, desc: it.desc});
    });
    if (!allItems.length) { showToast('No hay ítems en el presupuesto'); return; }
    var modal = document.createElement('div');
    modal.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.75);display:flex;align-items:center;justify-content:center;padding:16px;';
    var box = document.createElement('div');
    box.style.cssText = 'background:var(--card);border-radius:16px;padding:20px;width:100%;max-width:380px;max-height:75vh;overflow-y:auto;';
    box.innerHTML = '<div style="font-weight:700;font-size:15px;margin-bottom:14px;color:var(--text);">Seleccionar ítem de producción</div>';
    allItems.forEach(function(entry) {
      var btn = document.createElement('button');
      btn.style.cssText = 'display:block;width:100%;text-align:left;padding:10px 12px;margin-bottom:8px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:13px;cursor:pointer;';
      btn.textContent = entry.desc;
      btn.onclick = function() { document.body.removeChild(modal); _saveCADToItem(entry.key, entry.desc); };
      box.appendChild(btn);
    });
    var cancelBtn = document.createElement('button');
    cancelBtn.style.cssText = 'display:block;width:100%;padding:10px;margin-top:4px;background:transparent;border:1px solid var(--border);border-radius:10px;color:var(--text-secondary,#888);font-size:14px;cursor:pointer;';
    cancelBtn.textContent = 'Cancelar';
    cancelBtn.onclick = function() { document.body.removeChild(modal); };
    box.appendChild(cancelBtn);
    modal.appendChild(box);
    modal.onclick = function(e) { if (e.target===modal) document.body.removeChild(modal); };
    document.body.appendChild(modal);
  }).catch(function() { showToast('Error cargando presupuesto'); });
}

function _saveCADToItem(itemKey, itemDesc) {
  var prevDark = state.darkMode, prevGrid = state.gridOn, prevSel = state.selectedId;
  state.darkMode = false; state.gridOn = false; state.selectedId = null;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = '#ffffff'; ctx.fillRect(0,0,canvas.width,canvas.height);
  for (var _li=0; _li<state.layers.length; _li++) {
    if (!state.layers[_li].visible) continue;
    ctx.save();
    ctx.globalAlpha = typeof state.layers[_li].opacity==='number' ? state.layers[_li].opacity : 1;
    for (var _si=0; _si<state.layers[_li].shapes.length; _si++) drawShape(state.layers[_li].shapes[_si]);
    ctx.restore();
  }
  var jpegUrl = canvas.toDataURL('image/jpeg', 0.8);
  state.darkMode = prevDark; state.gridOn = prevGrid; state.selectedId = prevSel; setDirty();
  fbDb.ref('proyectos/'+CLIENT_ID+'/'+PROJECT_ID+'/presupuesto/items/'+itemKey+'/fotos').once('value').then(function(fSnap) {
    var fotos = [];
    if (fSnap.exists()) fSnap.forEach(function(c){ fotos.push(c.val()); });
    fotos.push({url: jpegUrl, name: 'CAD-'+(itemDesc||'plano')+'.jpg'});
    return fbDb.ref('proyectos/'+CLIENT_ID+'/'+PROJECT_ID+'/presupuesto/items/'+itemKey+'/fotos').set(fotos);
  }).then(function(){ showToast('Plano guardado en ítem ✓'); })
    .catch(function(err){ console.error(err); showToast('Error al guardar'); });
}

function saveToProject() {
  document.getElementById('save-popover').classList.add('hidden');
  if (!fbDb||!CLIENT_ID||!PROJECT_ID) { showToast('Configura el proyecto primero'); return; }
  try {
    fbDb.ref('proyectos/'+CLIENT_ID+'/'+PROJECT_ID+'/cad/drawings').push({
      layers:state.layers, view:state.view, unit:state.unit,
      scale:state.scale, origin:state.origin, savedAt:Date.now()
    }).then(function(){ showToast('Guardado en proyecto ✓'); })
      .catch(function(err){ console.error(err); showToast('Error al guardar'); });
  } catch(e) { showToast('Error al guardar'); }
}

function loadFromProject() {
  if (!fbDb||!CLIENT_ID||!PROJECT_ID) return;
  firebase.auth().onAuthStateChanged(function(user) {
    if (!user) return;
    try {
      fbDb.ref('proyectos/'+CLIENT_ID+'/'+PROJECT_ID+'/cad/drawings')
        .orderByChild('savedAt').limitToLast(1).once('value')
        .then(function(snap){
          if (!snap.exists()) return;
          snap.forEach(function(child){
            var data=child.val();
            if (data.layers) state.layers=data.layers;
            if (data.view) state.view=data.view;
            if (data.unit) { state.unit=data.unit; setUnit(data.unit); }
            if (data.scale) state.scale=data.scale;
            if (data.origin) state.origin=data.origin;
            pushHistory(); renderLayerPanel(); setDirty(); showToast('Diseño cargado');
          });
        }).catch(function(err){ console.warn('Load error',err); });
    } catch(e) { console.warn('Load error',e); }
  });
}

// ============================================================
function goBack() {
  if (window.history.length>1) window.history.back();
  else window.location.href='disenos.html'+(CLIENT_ID?'?cid='+CLIENT_ID+'&pid='+PROJECT_ID:'');
}

// ============================================================
//  TOAST
// ============================================================
var toastTimer=null;
function showToast(msg) {
  var el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){ el.classList.remove('show'); },3000);
}

// ============================================================
//  ROTATE / AUTO-DIM
// ============================================================
function rotateSelected(deg) {
  var sh=_getActionShape(); if (!sh) return;
  if (sh.type==='polygon-sym') {
    pushHistory();
    sh.rotation = ((sh.rotation||0)+deg+360)%360;
    setDirty(); showToast('Rotación: '+sh.rotation+'°');
  } else {
    showToast('Rotación no disponible para este tipo');
  }
}

function toggleAutoDim() {
  var sh=_getActionShape(); if (!sh) return;
  pushHistory();
  sh.autoDim=!sh.autoDim;
  setDirty(); showToast(sh.autoDim?'Acotado automático activado':'Acotado automático desactivado');
}

// ============================================================
//  DXF EXPORT
// ============================================================
function polylineDXF(verts, layerName, closed) {
  var lines=[];
  lines.push('0\nLWPOLYLINE');
  lines.push('8\n'+layerName);
  lines.push('70\n'+(closed?1:0));
  lines.push('90\n'+verts.length);
  for (var i=0;i<verts.length;i++) {
    lines.push('10\n'+verts[i].x.toFixed(4));
    lines.push('20\n'+verts[i].y.toFixed(4));
  }
  return lines.join('\n');
}

function shapeToDXF(sh, layerName) {
  var lyr=layerName||'0';
  switch(sh.type) {
    case 'rect': {
      var rv=[{x:sh.x,y:sh.y},{x:sh.x+sh.w,y:sh.y},{x:sh.x+sh.w,y:sh.y+sh.h},{x:sh.x,y:sh.y+sh.h}];
      return polylineDXF(rv,lyr,true);
    }
    case 'circle':
      return '0\nCIRCLE\n8\n'+lyr+'\n10\n'+sh.cx.toFixed(4)+'\n20\n'+sh.cy.toFixed(4)+'\n30\n0\n40\n'+sh.r.toFixed(4);
    case 'oval':
      return '0\nELLIPSE\n8\n'+lyr+'\n10\n'+sh.cx.toFixed(4)+'\n20\n'+sh.cy.toFixed(4)+'\n30\n0\n11\n'+sh.rx.toFixed(4)+'\n21\n0\n31\n0\n40\n'+(sh.ry/sh.rx).toFixed(6)+'\n41\n0\n42\n6.2831853';
    case 'line':
      return '0\nLINE\n8\n'+lyr+'\n10\n'+sh.x1.toFixed(4)+'\n20\n'+sh.y1.toFixed(4)+'\n30\n0\n11\n'+sh.x2.toFixed(4)+'\n21\n'+sh.y2.toFixed(4)+'\n31\n0';
    case 'polygon-free':
      if (sh.points&&sh.points.length>=2) return polylineDXF(sh.points,lyr,true);
      return '';
    case 'triangle':
      return polylineDXF(getTriangleVerts(sh),lyr,true);
    case 'polygon-sym': {
      var pv=[], rot2=(sh.rotation||0)*Math.PI/180;
      for (var i=0;i<sh.sides;i++) {
        var ang=2*Math.PI*i/sh.sides+rot2;
        pv.push({x:sh.cx+sh.radius*Math.cos(ang),y:sh.cy+sh.radius*Math.sin(ang)});
      }
      return polylineDXF(pv,lyr,true);
    }
    default: return '';
  }
}

function exportDXF() {
  document.getElementById('save-popover').classList.add('hidden');
  var lines=[];
  lines.push('0\nSECTION\n2\nHEADER\n9\n$INSUNITS\n70\n4\n0\nENDSEC');
  lines.push('0\nSECTION\n2\nENTITIES');
  for (var li=0;li<state.layers.length;li++) {
    var lyr=state.layers[li];
    if (!lyr.visible) continue;
    for (var si=0;si<lyr.shapes.length;si++) {
      var sh=lyr.shapes[si];
      if (!sh.visible||sh.type==='dimension') continue;
      var entity=shapeToDXF(sh,lyr.name);
      if (entity) lines.push(entity);
    }
  }
  lines.push('0\nENDSEC\n0\nEOF');
  var blob=new Blob([lines.join('\n')],{type:'text/plain'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.download='rubik-cad.dxf'; a.href=url; a.click();
  setTimeout(function(){URL.revokeObjectURL(url);},1000);
  showToast('DXF exportado');
}

// ============================================================
//  INIT
// ============================================================
function init() {
  resizeCanvas();
  state.origin.x=canvas.width/2;
  state.origin.y=canvas.height/2;
  ensureLayer();
  pushHistory();
  renderLayerPanel();
  loadFromProject();
  requestAnimationFrame(render);
  selectTool('select');
  showToast('Rubik CAD listo');
}

init();
</script>
