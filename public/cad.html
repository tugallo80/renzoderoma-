<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--bg:#f4f4f7;--card:#fff;--text:#1a1a1a;--blue:#007aff;--green:#34c759;--red:#ff3b30;--orange:#ff9500;--purple:#af52de;--gray:#8e8e93;--border:#d1d1d6;--topH:52px;--botH:68px;}
body.dark-mode{--bg:#000;--card:#1c1c1e;--text:#fff;--border:#333;--canvas-bg:#111;}
body{font-family:-apple-system,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100dvh;display:flex;flex-direction:column;}

/* TOP BAR */
#top-bar{height:var(--topH);background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;padding:0 10px;overflow-x:auto;overflow-y:hidden;scrollbar-width:none;flex-shrink:0;z-index:100;}
#top-bar::-webkit-scrollbar{display:none;}
.tb-btn{flex-shrink:0;display:flex;align-items:center;gap:4px;padding:7px 11px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;}
.tb-btn.active{background:var(--blue);color:#fff;border-color:var(--blue);}
.tb-btn.danger{color:var(--red);border-color:var(--red);}
.tb-sep{width:1px;height:28px;background:var(--border);flex-shrink:0;margin:0 2px;}
#grid-size-inp{width:56px;padding:6px 8px;border:1px solid var(--border);border-radius:8px;font-size:12px;font-weight:700;background:var(--card);color:var(--text);}
.seg-ctrl{display:flex;border:1px solid var(--border);border-radius:10px;overflow:hidden;flex-shrink:0;}
.seg-btn{padding:7px 10px;border:none;background:var(--card);color:var(--gray);font-size:11px;font-weight:800;cursor:pointer;border-right:1px solid var(--border);}
.seg-btn:last-child{border-right:none;}
.seg-btn.active{background:var(--blue);color:#fff;}

/* CANVAS AREA */
#canvas-wrap{flex:1;position:relative;overflow:hidden;background:var(--canvas-bg,var(--bg));}
#main-canvas{position:absolute;top:0;left:0;touch-action:none;cursor:crosshair;}
#main-canvas.tool-select{cursor:default;}
#main-canvas.tool-move{cursor:grab;}
#main-canvas.tool-move.dragging{cursor:grabbing;}

/* BOTTOM BAR */
#bot-bar{height:var(--botH);background:var(--card);border-top:1px solid var(--border);display:flex;align-items:center;gap:5px;padding:0 10px;overflow-x:auto;overflow-y:hidden;scrollbar-width:none;flex-shrink:0;z-index:100;}
#bot-bar::-webkit-scrollbar{display:none;}
.tool-btn{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 10px;border-radius:12px;border:none;background:transparent;color:var(--gray);font-size:10px;font-weight:700;cursor:pointer;min-width:52px;}
.tool-btn i{font-size:22px;}
.tool-btn.active{background:rgba(0,122,255,0.12);color:var(--blue);}
.tool-btn.action{color:var(--purple);}
.tool-btn.action.active{background:rgba(175,82,222,0.12);color:var(--purple);}
.bot-sep{width:1px;height:40px;background:var(--border);flex-shrink:0;}
#stroke-color-inp{width:32px;height:32px;border-radius:8px;border:2px solid var(--border);cursor:pointer;padding:0;flex-shrink:0;}
#stroke-w-inp{width:52px;padding:6px 8px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-weight:700;background:var(--card);color:var(--text);flex-shrink:0;}
.snap-btn{flex-shrink:0;display:flex;align-items:center;gap:4px;padding:6px 10px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--gray);font-size:11px;font-weight:800;cursor:pointer;}
.snap-btn.active{background:rgba(255,149,0,0.12);color:var(--orange);border-color:var(--orange);}

/* LAYER PANEL */
#layer-panel{position:fixed;top:0;right:-300px;width:280px;height:100dvh;background:var(--card);border-left:1px solid var(--border);z-index:200;transition:right 0.28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;padding-top:var(--topH);}
#layer-panel.open{right:0;}
#layer-panel-head{padding:14px 16px;font-weight:900;font-size:15px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
#layer-list{flex:1;overflow-y:auto;padding:8px;}
.layer-row{display:flex;align-items:center;gap:8px;padding:10px 10px;border-radius:10px;cursor:pointer;margin-bottom:4px;border:1px solid transparent;}
.layer-row.selected{background:rgba(0,122,255,0.08);border-color:var(--blue);}
.layer-row:hover{background:rgba(0,0,0,0.03);}
.layer-name{flex:1;font-size:12px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.layer-icon-btn{background:none;border:none;cursor:pointer;color:var(--gray);font-size:16px;padding:2px;}
.layer-icon-btn.active{color:var(--blue);}

/* MODALS */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:500;align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal-box{background:var(--card);border-radius:22px;padding:24px 20px;width:90%;max-width:340px;max-height:85dvh;overflow-y:auto;}
.modal-title{font-size:17px;font-weight:900;color:var(--text);margin-bottom:18px;}
.form-row{margin-bottom:14px;}
.form-row label{display:block;font-size:11px;font-weight:800;color:var(--gray);margin-bottom:5px;text-transform:uppercase;}
.form-row input,.form-row select{width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:10px;font-size:15px;font-weight:700;background:var(--card);color:var(--text);}
.form-row .unit-hint{font-size:10px;color:var(--gray);margin-top:3px;}
.modal-actions{display:flex;gap:10px;margin-top:20px;}
.btn-primary{flex:1;padding:13px;background:var(--blue);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:900;cursor:pointer;}
.btn-sec-modal{flex:1;padding:13px;background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;}
.radio-group{display:flex;flex-direction:column;gap:8px;}
.radio-opt{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;font-weight:700;}

/* FLOATING SHAPE TOOLBAR */
#float-tb{display:none;position:absolute;z-index:150;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:6px;box-shadow:0 4px 20px rgba(0,0,0,0.15);gap:4px;align-items:center;}
.float-btn{padding:7px 10px;border-radius:8px;border:none;font-size:11px;font-weight:800;cursor:pointer;background:transparent;color:var(--text);display:flex;align-items:center;gap:4px;}
.float-btn:hover{background:rgba(0,0,0,0.06);}
.float-btn.del{color:var(--red);}

/* TOAST */
#toast{position:fixed;bottom:calc(var(--botH) + 16px);left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:600;pointer-events:none;opacity:0;transition:opacity 0.3s;}
#toast.show{opacity:1;}

/* SAVE POPOVER */
#save-pop{display:none;position:absolute;top:calc(var(--topH) + 4px);right:10px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:8px;box-shadow:0 4px 20px rgba(0,0,0,0.15);z-index:300;min-width:180px;}
.save-opt{padding:11px 14px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px;}
.save-opt:hover{background:rgba(0,0,0,0.05);}
</style>
</head>

<!-- MODALS -->
<!-- Shape config modal -->

<!-- Dimension manual instruction overlay (shown briefly) -->
<div id="toast"></div>

<script>
// ─── UTILS ────────────────────────────────────────────────────────────────────
const urlP = new URLSearchParams(location.search);
const cid = urlP.get('cid') || localStorage.getItem('rubik_client_id') || '';
const pid = urlP.get('pid') || '';
const db = firebase.database();

function uid() { return Date.now().toString(36) + Math.random().toString(36).substr(2,5); }

function toast(msg, dur=2500) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove('show'), dur);
}

function goBack() {
  if (history.length > 1) history.back();
  else location.href = `disenos.html?cid=${cid}&pid=${pid}`;
}

// ─── STATE ────────────────────────────────────────────────────────────────────
const S = {
  unit: 'cm',
  gridEnabled: false,
  gridSize: 100,       // mm
  view: 'planta',      // planta | frontal | lateral | axo
  darkMode: false,
  scale: 2,            // px per mm
  originX: 0, originY: 0,  // canvas px offset for world (0,0)
  tool: null,
  layers: [],          // array of shape objects
  selectedId: null,
  snapGrid: false,
  snapVertex: false,
  strokeColor: '#000000',
  strokeWidth: 2,
  history: [], histIdx: -1,
  // temp drawing state
  drawing: false,
  drawPoints: [],      // for polygon-free
  dimStep: 0, dimP1: null,  // for manual dimension
  dragging: false, dragShapeId: null, dragOfsX: 0, dragOfsY: 0,
  pointers: {},        // active pointer events for pinch
  lastPinchDist: null,
};

let pendingShapePos = { x: 0, y: 0 }; // world coords where shape dialog was triggered
let pendingEditId = null;

// ─── CANVAS SETUP ─────────────────────────────────────────────────────────────
const wrap = document.getElementById('canvas-wrap');
const canvas = document.getElementById('main-canvas');
const ctx = canvas.getContext('2d');
let rafId = null;
let dirty = true;

function resizeCanvas() {
  canvas.width = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  if (S.originX === 0 && S.originY === 0) {
    S.originX = wrap.clientWidth / 2;
    S.originY = wrap.clientHeight / 2;
  }
  dirty = true;
}

window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function markDirty() { dirty = true; }

// ─── COORDINATE TRANSFORMS ────────────────────────────────────────────────────
const COS30 = Math.cos(Math.PI / 6);
const SIN30 = Math.sin(Math.PI / 6);

function worldToScreen(wx, wy, wz = 0) {
  const v = S.view;
  let sx, sy;
  if (v === 'axo') {
    sx = S.originX + (wx + wy * COS30 * 0.5) * S.scale;
    sy = S.originY - (wz + wy * SIN30 * 0.5) * S.scale;
  } else if (v === 'planta') {
    sx = S.originX + wx * S.scale;
    sy = S.originY - wy * S.scale;
  } else if (v === 'frontal') {
    sx = S.originX + wx * S.scale;
    sy = S.originY - wz * S.scale;
  } else { // lateral
    sx = S.originX + wy * S.scale;
    sy = S.originY - wz * S.scale;
  }
  return { x: sx, y: sy };
}

function screenToWorld(sx, sy) {
  const v = S.view;
  if (v === 'planta') {
    return { x: (sx - S.originX) / S.scale, y: -(sy - S.originY) / S.scale };
  } else if (v === 'frontal') {
    return { x: (sx - S.originX) / S.scale, y: 0, z: -(sy - S.originY) / S.scale };
  } else if (v === 'lateral') {
    return { x: 0, y: (sx - S.originX) / S.scale, z: -(sy - S.originY) / S.scale };
  }
  // axo inverse (approximate, ignoring y component)
  return { x: (sx - S.originX) / S.scale, y: 0, z: -(sy - S.originY) / S.scale };
}

function applySnap(wx, wy) {
  let rx = wx, ry = wy;
  if (S.snapGrid && S.gridEnabled) {
    const g = S.gridSize;
    rx = Math.round(wx / g) * g;
    ry = Math.round(wy / g) * g;
  }
  if (S.snapVertex) {
    let bestD = 15 / S.scale, bestX = null, bestY = null;
    for (const sh of S.layers) {
      if (sh.id === S.dragShapeId) continue;
      const verts = getVertices(sh);
      for (const v of verts) {
        const d = Math.hypot(v.x - wx, v.y - wy);
        if (d < bestD) { bestD = d; bestX = v.x; bestY = v.y; }
      }
    }
    if (bestX !== null) { rx = bestX; ry = bestY; }
  }
  return { x: rx, y: ry };
}

function getVertices(sh) {
  const pts = [];
  if (sh.type === 'rect') {
    pts.push({x:sh.x,y:sh.y},{x:sh.x+sh.w,y:sh.y},{x:sh.x+sh.w,y:sh.y+sh.h},{x:sh.x,y:sh.y+sh.h});
    pts.push({x:sh.x+sh.w/2,y:sh.y},{x:sh.x+sh.w,y:sh.y+sh.h/2},{x:sh.x+sh.w/2,y:sh.y+sh.h},{x:sh.x,y:sh.y+sh.h/2});
  } else if (sh.type === 'circle') {
    pts.push({x:sh.cx,y:sh.cy},{x:sh.cx+sh.r,y:sh.cy},{x:sh.cx-sh.r,y:sh.cy},{x:sh.cx,y:sh.cy+sh.r},{x:sh.cx,y:sh.cy-sh.r});
  } else if (sh.type === 'oval') {
    pts.push({x:sh.cx,y:sh.cy},{x:sh.cx+sh.rx,y:sh.cy},{x:sh.cx-sh.rx,y:sh.cy},{x:sh.cx,y:sh.cy+sh.ry},{x:sh.cx,y:sh.cy-sh.ry});
  } else if (sh.type === 'polygon-sym') {
    const n = sh.sides, r = sh.radius, a0 = sh.rotation || 0;
    for (let i = 0; i < n; i++) { const a = a0 + (2*Math.PI*i/n); pts.push({x:sh.cx+r*Math.cos(a),y:sh.cy+r*Math.sin(a)}); }
  } else if (sh.type === 'triangle') {
    pts.push(...trianglePoints(sh));
  } else if (sh.type === 'polygon-free') {
    pts.push(...sh.points);
  } else if (sh.type === 'line') {
    pts.push({x:sh.x1,y:sh.y1},{x:sh.x2,y:sh.y2});
  }
  return pts;
}

function trianglePoints(sh) {
  if (sh.variant === 'equilateral') {
    const h = sh.base * Math.sqrt(3) / 2;
    return [{x:sh.x,y:sh.y},{x:sh.x+sh.base,y:sh.y},{x:sh.x+sh.base/2,y:sh.y+h}];
  } else if (sh.variant === 'right') {
    return [{x:sh.x,y:sh.y},{x:sh.x+sh.base,y:sh.y},{x:sh.x,y:sh.y+sh.height}];
  } else {
    return [{x:sh.x,y:sh.y},{x:sh.x+sh.base,y:sh.y},{x:sh.x+sh.base/2,y:sh.y+sh.height}];
  }
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function renderLoop() {
  if (dirty) { dirty = false; render(); }
  rafId = requestAnimationFrame(renderLoop);
}

function render() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = S.darkMode ? '#111' : '#f4f4f7';
  ctx.fillRect(0, 0, W, H);

  // Grid
  if (S.gridEnabled) drawGrid();

  // Axes
  drawAxes();

  // Shapes
  for (const sh of S.layers) {
    if (!sh.visible) continue;
    drawShape(sh, sh.id === S.selectedId);
  }

  // Active drawing preview
  drawPreview();

  // Snap indicator
  if (S._snapIndicator) {
    const sp = worldToScreen(S._snapIndicator.x, S._snapIndicator.y);
    ctx.beginPath(); ctx.arc(sp.x, sp.y, 7, 0, Math.PI*2);
    ctx.strokeStyle = '#ff9500'; ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = 'rgba(255,149,0,0.2)'; ctx.fill();
  }
}

function drawAxes() {
  const W = canvas.width, H = canvas.height;
  const origin = worldToScreen(0, 0, 0);
  ctx.strokeStyle = S.darkMode ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.12)';
  ctx.lineWidth = 1;
  // X axis
  ctx.beginPath(); ctx.moveTo(0, origin.y); ctx.lineTo(W, origin.y); ctx.stroke();
  // Y axis
  ctx.beginPath(); ctx.moveTo(origin.x, 0); ctx.lineTo(origin.x, H); ctx.stroke();
}

function drawGrid() {
  const W = canvas.width, H = canvas.height;
  const g = S.gridSize * S.scale;
  if (g < 4) return;

  // Sub-grid (1/5)
  if (g >= 20) {
    const sg = g / 5;
    ctx.beginPath(); ctx.strokeStyle = S.darkMode ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.04)';
    ctx.lineWidth = 0.5;
    const startX = S.originX % sg; const startY = S.originY % sg;
    for (let x = startX; x < W; x += sg) { ctx.moveTo(x, 0); ctx.lineTo(x, H); }
    for (let y = startY; y < H; y += sg) { ctx.moveTo(0, y); ctx.lineTo(W, y); }
    ctx.stroke();
  }

  // Main grid
  ctx.beginPath(); ctx.strokeStyle = S.darkMode ? 'rgba(255,255,255,0.09)' : 'rgba(0,0,0,0.09)';
  ctx.lineWidth = 1;
  const startX = ((S.originX % g) + g) % g; const startY = ((S.originY % g) + g) % g;
  for (let x = startX; x < W; x += g) { ctx.moveTo(x, 0); ctx.lineTo(x, H); }
  for (let y = startY; y < H; y += g) { ctx.moveTo(0, y); ctx.lineTo(W, y); }
  ctx.stroke();
}

function applyShapeStyle(sh) {
  ctx.strokeStyle = sh.strokeColor || '#000';
  ctx.lineWidth = sh.strokeWidth || 2;
  ctx.fillStyle = sh.fillColor && sh.fillColor !== 'none' ? sh.fillColor : 'transparent';
}

function drawShape(sh, selected) {
  ctx.save();
  applyShapeStyle(sh);

  const view = S.view;

  if (sh.type === 'rect') {
    if (view === 'planta' || view === 'axo') {
      const p = worldToScreen(sh.x, sh.y);
      const p2 = worldToScreen(sh.x + sh.w, sh.y + sh.h);
      const sx = Math.min(p.x, p2.x), sy = Math.min(p.y, p2.y);
      const sw = Math.abs(p2.x - p.x), sh2 = Math.abs(p2.y - p.y);
      if (sh.fillColor && sh.fillColor !== 'none') { ctx.fillRect(sx, sy, sw, sh2); }
      ctx.strokeRect(sx, sy, sw, sh2);
      drawSections(sh, sx, sy, sw, sh2);
      if (sh.extruded && view === 'axo') drawExtrusion(sh);
    } else if (view === 'frontal') {
      const p = worldToScreen(sh.x, 0, 0);
      const p2 = worldToScreen(sh.x + sh.w, 0, sh.extruded ? sh.extrudeH : 0);
      const sx = Math.min(p.x, p2.x), sy = Math.min(p.y, p2.y);
      const sw = Math.abs(p2.x - p.x), sh2 = sh.extruded ? Math.abs(p2.y - p.y) : 20;
      ctx.strokeRect(sx, sy, sw, sh2);
    } else if (view === 'lateral') {
      const p = worldToScreen(sh.y, 0, 0);
      const p2 = worldToScreen(sh.y + sh.h, 0, sh.extruded ? sh.extrudeH : 0);
      const sx = Math.min(p.x, p2.x), sy = Math.min(p.y, p2.y);
      const sw = Math.abs(p2.x - p.x), sh2 = sh.extruded ? Math.abs(p2.y - p.y) : 20;
      ctx.strokeRect(sx, sy, sw, sh2);
    }
  } else if (sh.type === 'circle') {
    if (view === 'planta') {
      const c = worldToScreen(sh.cx, sh.cy);
      const r = sh.r * S.scale;
      ctx.beginPath(); ctx.arc(c.x, c.y, r, 0, Math.PI*2);
      if (sh.fillColor && sh.fillColor !== 'none') ctx.fill();
      ctx.stroke();
      drawCircleSections(sh, c.x, c.y, r);
    } else {
      const p = worldToScreen(sh.cx - sh.r, 0, 0);
      const p2 = worldToScreen(sh.cx + sh.r, 0, sh.extruded ? sh.extrudeH : sh.r * 2);
      const sx = Math.min(p.x, p2.x), sy = Math.min(p.y, p2.y);
      const sw = Math.abs(p2.x - p.x), sh2 = Math.abs(p2.y - p.y);
      ctx.strokeRect(sx, sy, sw, sh2);
    }
  } else if (sh.type === 'oval') {
    if (view === 'planta') {
      const c = worldToScreen(sh.cx, sh.cy);
      const rx = sh.rx * S.scale, ry = sh.ry * S.scale;
      ctx.beginPath(); ctx.ellipse(c.x, c.y, rx, ry, 0, 0, Math.PI*2);
      if (sh.fillColor && sh.fillColor !== 'none') ctx.fill();
      ctx.stroke();
    }
  } else if (sh.type === 'polygon-sym') {
    const pts = getVertices(sh).map(v => worldToScreen(v.x, v.y));
    drawPolyPath(pts, sh);
    if (view === 'planta') drawPolySections(sh, pts);
  } else if (sh.type === 'triangle') {
    const pts = trianglePoints(sh).map(v => worldToScreen(v.x, v.y));
    drawPolyPath(pts, sh);
  } else if (sh.type === 'polygon-free') {
    if (!sh.points || sh.points.length < 2) { ctx.restore(); return; }
    const pts = sh.points.map(v => worldToScreen(v.x, v.y));
    drawPolyPath(pts, sh);
  } else if (sh.type === 'line') {
    const p1 = worldToScreen(sh.x1, sh.y1);
    const p2 = worldToScreen(sh.x2, sh.y2);
    ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
  } else if (sh.type === 'dimension') {
    drawDimension(sh);
    ctx.restore(); return;
  }

  // Selection highlight
  if (selected) {
    ctx.save();
    ctx.strokeStyle = '#007aff'; ctx.lineWidth = 2;
    ctx.setLineDash([5, 4]);
    const bb = getBoundingBox(sh);
    if (bb) {
      const p1 = worldToScreen(bb.minX - 5/S.scale, bb.minY - 5/S.scale);
      const p2 = worldToScreen(bb.maxX + 5/S.scale, bb.maxY + 5/S.scale);
      ctx.strokeRect(Math.min(p1.x,p2.x), Math.min(p1.y,p2.y), Math.abs(p2.x-p1.x), Math.abs(p2.y-p1.y));
    }
    ctx.restore();
    // Selection handles
    const verts = getVertices(sh).slice(0, 4);
    for (const v of verts) {
      const sp = worldToScreen(v.x, v.y);
      ctx.beginPath(); ctx.arc(sp.x, sp.y, 5, 0, Math.PI*2);
      ctx.fillStyle = '#fff'; ctx.fill();
      ctx.strokeStyle = '#007aff'; ctx.lineWidth = 2; ctx.stroke();
    }
  }

  ctx.restore();
}

function drawPolyPath(pts, sh) {
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
  ctx.closePath();
  if (sh.fillColor && sh.fillColor !== 'none') ctx.fill();
  ctx.stroke();
}

function drawSections(sh, sx, sy, sw, sh2) {
  if (!sh.sectionsV && !sh.sectionsH) return;
  ctx.save();
  ctx.strokeStyle = lightenColor(sh.strokeColor || '#000', 0.5);
  ctx.lineWidth = Math.max(0.5, (sh.strokeWidth || 2) * 0.5);
  ctx.setLineDash([4, 3]);
  if (sh.sectionsV > 1) {
    const step = sw / sh.sectionsV;
    for (let i = 1; i < sh.sectionsV; i++) {
      ctx.beginPath(); ctx.moveTo(sx + step*i, sy); ctx.lineTo(sx + step*i, sy+sh2); ctx.stroke();
    }
  }
  if (sh.sectionsH > 1) {
    const step = sh2 / sh.sectionsH;
    for (let i = 1; i < sh.sectionsH; i++) {
      ctx.beginPath(); ctx.moveTo(sx, sy+step*i); ctx.lineTo(sx+sw, sy+step*i); ctx.stroke();
    }
  }
  ctx.restore();
}

function drawCircleSections(sh, cx, cy, r) {
  if (!sh.sectionsAngular) return;
  ctx.save();
  ctx.strokeStyle = lightenColor(sh.strokeColor || '#000', 0.5);
  ctx.lineWidth = Math.max(0.5, (sh.strokeWidth||2)*0.5);
  ctx.setLineDash([4,3]);
  const n = sh.sectionsAngular;
  for (let i = 0; i < n; i++) {
    const a = (2*Math.PI*i/n) - Math.PI/2;
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx+r*Math.cos(a), cy+r*Math.sin(a)); ctx.stroke();
  }
  ctx.restore();
}

function drawPolySections(sh, pts) {
  if (!sh.sectionsAngular) return;
  const cx = worldToScreen(sh.cx, sh.cy);
  ctx.save();
  ctx.strokeStyle = lightenColor(sh.strokeColor || '#000', 0.5);
  ctx.lineWidth = Math.max(0.5, (sh.strokeWidth||2)*0.5);
  ctx.setLineDash([4,3]);
  for (let i = 0; i < pts.length; i++) {
    const mid = { x: (pts[i].x + pts[(i+1)%pts.length].x)/2, y: (pts[i].y + pts[(i+1)%pts.length].y)/2 };
    ctx.beginPath(); ctx.moveTo(cx.x, cx.y); ctx.lineTo(mid.x, mid.y); ctx.stroke();
  }
  ctx.restore();
}

function drawExtrusion(sh) {
  if (!sh.extruded || S.view !== 'axo') return;
  ctx.save();
  ctx.strokeStyle = sh.strokeColor || '#000';
  ctx.lineWidth = sh.strokeWidth || 2;
  ctx.setLineDash([6,3]);
  const corners = [
    {x:sh.x,y:sh.y},{x:sh.x+sh.w,y:sh.y},{x:sh.x+sh.w,y:sh.y+sh.h},{x:sh.x,y:sh.y+sh.h}
  ];
  for (const c of corners) {
    const b = worldToScreen(c.x, c.y, 0);
    const t = worldToScreen(c.x, c.y, sh.extrudeH);
    ctx.beginPath(); ctx.moveTo(b.x,b.y); ctx.lineTo(t.x,t.y); ctx.stroke();
  }
  // Top face
  ctx.setLineDash([]);
  ctx.beginPath();
  const top = corners.map(c => worldToScreen(c.x, c.y, sh.extrudeH));
  ctx.moveTo(top[0].x, top[0].y);
  for (let i = 1; i < top.length; i++) ctx.lineTo(top[i].x, top[i].y);
  ctx.closePath(); ctx.stroke();
  ctx.restore();
}

function drawDimension(sh) {
  const p1 = worldToScreen(sh.x1, sh.y1);
  const p2 = worldToScreen(sh.x2, sh.y2);
  const dist = Math.hypot(sh.x2-sh.x1, sh.y2-sh.y1);
  const label = formatDist(dist);
  const ox = -(p2.y-p1.y)/Math.hypot(p2.x-p1.x,p2.y-p1.y)*14;
  const oy = (p2.x-p1.x)/Math.hypot(p2.x-p1.x,p2.y-p1.y)*14;

  ctx.strokeStyle = '#007aff'; ctx.lineWidth = 1;
  // Extension lines
  ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p1.x+ox,p1.y+oy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(p2.x,p2.y); ctx.lineTo(p2.x+ox,p2.y+oy); ctx.stroke();
  // Dimension line
  ctx.beginPath(); ctx.moveTo(p1.x+ox,p1.y+oy); ctx.lineTo(p2.x+ox,p2.y+oy); ctx.stroke();
  // Arrows
  drawArrow(ctx, p1.x+ox, p1.y+oy, p2.x+ox, p2.y+oy, true);
  drawArrow(ctx, p2.x+ox, p2.y+oy, p1.x+ox, p1.y+oy, true);
  // Label
  const mx = (p1.x+p2.x)/2+ox, my = (p1.y+p2.y)/2+oy;
  ctx.fillStyle = '#007aff'; ctx.font = 'bold 11px -apple-system,sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
  ctx.fillText(label, mx, my-2);
}

function drawArrow(ctx, fx, fy, tx, ty, small) {
  const angle = Math.atan2(ty-fy, tx-fx);
  const size = small ? 7 : 10;
  ctx.beginPath();
  ctx.moveTo(fx, fy);
  ctx.lineTo(fx + size*Math.cos(angle+0.4), fy + size*Math.sin(angle+0.4));
  ctx.moveTo(fx, fy);
  ctx.lineTo(fx + size*Math.cos(angle-0.4), fy + size*Math.sin(angle-0.4));
  ctx.stroke();
}

function drawPreview() {
  if (S.tool === 'polygon-free' && S.drawPoints.length > 0) {
    const pts = S.drawPoints.map(v => worldToScreen(v.x, v.y));
    ctx.save(); ctx.strokeStyle = S.strokeColor; ctx.lineWidth = S.strokeWidth;
    ctx.setLineDash([5,4]);
    ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
    if (S._cursorWorld) {
      const cp = worldToScreen(S._cursorWorld.x, S._cursorWorld.y);
      ctx.lineTo(cp.x, cp.y);
    }
    ctx.stroke();
    for (const p of pts) { ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fillStyle='#007aff'; ctx.fill(); }
    ctx.restore();
  }
  if (S.tool === 'line' && S.drawing && S.lineStart) {
    const p1 = worldToScreen(S.lineStart.x, S.lineStart.y);
    if (S._cursorWorld) {
      const p2 = worldToScreen(S._cursorWorld.x, S._cursorWorld.y);
      ctx.save(); ctx.strokeStyle = S.strokeColor; ctx.lineWidth = S.strokeWidth;
      ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y); ctx.stroke();
      const dist = Math.hypot(S._cursorWorld.x - S.lineStart.x, S._cursorWorld.y - S.lineStart.y);
      ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.font = 'bold 11px sans-serif';
      ctx.fillText(formatDist(dist), p2.x+8, p2.y-4);
      ctx.restore();
    }
  }
  if (S.tool === 'dimension' && S.dimStep === 1 && S.dimP1) {
    const p1 = worldToScreen(S.dimP1.x, S.dimP1.y);
    if (S._cursorWorld) {
      const p2 = worldToScreen(S._cursorWorld.x, S._cursorWorld.y);
      ctx.save(); ctx.strokeStyle='#007aff'; ctx.lineWidth=1; ctx.setLineDash([4,3]);
      ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y); ctx.stroke();
      ctx.restore();
    }
  }
}

function lightenColor(hex, amount) {
  const c = parseInt(hex.slice(1),16);
  const r = Math.min(255, (c>>16) + amount*255 | 0);
  const g = Math.min(255, ((c>>8)&0xff) + amount*255 | 0);
  const b = Math.min(255, (c&0xff) + amount*255 | 0);
  return `rgb(${r},${g},${b})`;
}

function getBoundingBox(sh) {
  const verts = getVertices(sh);
  if (!verts.length) return null;
  const xs = verts.map(v=>v.x), ys = verts.map(v=>v.y);
  return { minX: Math.min(...xs), maxX: Math.max(...xs), minY: Math.min(...ys), maxY: Math.max(...ys) };
}

function formatDist(mm) {
  if (S.unit === 'm') return (mm/1000).toFixed(3) + ' m';
  return (mm/10).toFixed(1) + ' cm';
}

// ─── UNIT CONVERSION ──────────────────────────────────────────────────────────
function toMM(val) {
  const v = parseFloat(val) || 0;
  return S.unit === 'm' ? v * 1000 : v * 10;
}
function fromMM(mm) {
  return S.unit === 'm' ? mm / 1000 : mm / 10;
}

// ─── TOOLBAR ACTIONS ─────────────────────────────────────────────────────────
function setUnit(u, btn) {
  S.unit = u;
  document.querySelectorAll('#unit-ctrl .seg-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('grid-unit-lbl').textContent = u;
  document.getElementById('extrude-unit-lbl').textContent = u;
  markDirty();
}

function toggleGrid() {
  S.gridEnabled = !S.gridEnabled;
  const btn = document.getElementById('grid-btn');
  const inp = document.getElementById('grid-size-inp');
  const lbl = document.getElementById('grid-unit-lbl');
  btn.classList.toggle('active', S.gridEnabled);
  inp.style.display = S.gridEnabled ? '' : 'none';
  lbl.style.display = S.gridEnabled ? '' : 'none';
  markDirty();
}

function setGridSize(v) {
  S.gridSize = toMM(v);
  markDirty();
}

function setView(v, btn) {
  S.view = v;
  S._axo = false;
  document.getElementById('axo-btn').classList.remove('active');
  document.querySelectorAll('#view-ctrl .seg-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  markDirty();
}

function toggleAxo() {
  S._axo = !S._axo;
  S.view = S._axo ? 'axo' : 'planta';
  document.getElementById('axo-btn').classList.toggle('active', S._axo);
  if (S._axo) {
    document.querySelectorAll('#view-ctrl .seg-btn').forEach(b => b.classList.remove('active'));
  } else {
    document.querySelectorAll('#view-ctrl .seg-btn')[0].classList.add('active');
  }
  markDirty();
}

function toggleNight() {
  S.darkMode = !S.darkMode;
  document.body.classList.toggle('dark-mode', S.darkMode);
  const btn = document.getElementById('night-btn');
  btn.innerHTML = S.darkMode ? '<i class="ph-bold ph-sun"></i>' : '<i class="ph-bold ph-moon"></i>';
  markDirty();
}

function toggleLayerPanel() {
  document.getElementById('layer-panel').classList.toggle('open');
}

function toggleSavePop() {
  const pop = document.getElementById('save-pop');
  pop.style.display = pop.style.display === 'block' ? 'none' : 'block';
}
document.addEventListener('click', e => {
  if (!e.target.closest('#save-btn') && !e.target.closest('#save-pop')) {
    document.getElementById('save-pop').style.display = 'none';
  }
});

function setStrokeColor(v) { S.strokeColor = v; }
function setStrokeWidth(v) { S.strokeWidth = v; }
function toggleSnapGrid() {
  S.snapGrid = !S.snapGrid;
  document.getElementById('snap-grid-btn').classList.toggle('active', S.snapGrid);
}
function toggleSnapVertex() {
  S.snapVertex = !S.snapVertex;
  document.getElementById('snap-vertex-btn').classList.toggle('active', S.snapVertex);
}

// ─── TOOL SELECTION ───────────────────────────────────────────────────────────
function setTool(t) {
  // Cancel any active drawing
  S.drawPoints = []; S.drawing = false; S.lineStart = null;
  S.dimStep = 0; S.dimP1 = null;
  S.selectedId = null;
  hideFloatTb();

  S.tool = t;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('tool-' + t);
  if (btn) btn.classList.add('active');

  canvas.className = 'tool-' + (t === 'select' ? 'select' : t === 'move' ? 'move' : 'draw');
  markDirty();

  if (t === 'dimension') {
    toast('Toca dos puntos para acotar manualmente', 3500);
  }
  if (t === 'polygon-free') {
    toast('Toca para agregar vértices. Doble toque para cerrar.', 3500);
  }
}

// ─── POINTER EVENTS ──────────────────────────────────────────────────────────
let _lastTap = 0;

canvas.addEventListener('pointerdown', onPointerDown);
canvas.addEventListener('pointermove', onPointerMove);
canvas.addEventListener('pointerup', onPointerUp);
canvas.addEventListener('pointercancel', onPointerUp);
canvas.addEventListener('wheel', onWheel, { passive: false });

function getCanvasPos(e) {
  const r = canvas.getBoundingClientRect();
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}

function onPointerDown(e) {
  e.preventDefault();
  S.pointers[e.pointerId] = { x: e.clientX, y: e.clientY };
  canvas.setPointerCapture(e.pointerId);

  const pCount = Object.keys(S.pointers).length;
  if (pCount === 2) {
    // Pinch zoom start
    const pts = Object.values(S.pointers);
    S.lastPinchDist = Math.hypot(pts[1].x-pts[0].x, pts[1].y-pts[0].y);
    S._pinchMidX = (pts[0].x+pts[1].x)/2;
    S._pinchMidY = (pts[0].y+pts[1].y)/2;
    return;
  }
  if (pCount > 1) return;

  const cp = getCanvasPos(e);
  const wpt = screenToWorld(cp.x, cp.y);
  const snapped = applySnap(wpt.x, wpt.y);

  // Double tap detection
  const now = Date.now();
  const dblTap = (now - _lastTap) < 350;
  _lastTap = now;

  if (S.tool === 'polygon-free') {
    if (dblTap && S.drawPoints.length >= 3) {
      // Close polygon
      S.drawPoints.pop(); // remove last (which is double-tapped duplicate)
      finishFreePolygon();
      return;
    }
    S.drawPoints.push(snapped);
    markDirty(); return;
  }

  if (S.tool === 'line') {
    if (!S.drawing) { S.lineStart = snapped; S.drawing = true; }
    else {
      pushHistory();
      addShape({ type:'line', x1:S.lineStart.x, y1:S.lineStart.y, x2:snapped.x, y2:snapped.y });
      S.drawing = false; S.lineStart = null;
    }
    markDirty(); return;
  }

  if (S.tool === 'dimension') {
    if (S.dimStep === 0) { S.dimP1 = snapped; S.dimStep = 1; toast('Toca el segundo punto', 2000); }
    else {
      pushHistory();
      addShape({ type:'dimension', x1:S.dimP1.x, y1:S.dimP1.y, x2:snapped.x, y2:snapped.y, name:'Cota' });
      S.dimStep = 0; S.dimP1 = null;
    }
    markDirty(); return;
  }

  if (S.tool === 'select') {
    const hit = hitTest(cp.x, cp.y);
    if (hit) {
      S.selectedId = hit.id;
      showFloatTb(cp.x, cp.y);
    } else {
      S.selectedId = null; hideFloatTb();
    }
    renderLayerPanel(); markDirty(); return;
  }

  if (S.tool === 'move') {
    const hit = hitTest(cp.x, cp.y);
    if (hit) {
      S.dragShapeId = hit.id; S.selectedId = hit.id;
      S.dragging = true;
      const sh = S.layers.find(l=>l.id===hit.id);
      const bb = getBoundingBox(sh);
      S.dragOfsX = (bb.minX + bb.maxX)/2 - snapped.x;
      S.dragOfsY = (bb.minY + bb.maxY)/2 - snapped.y;
      canvas.classList.add('dragging');
    }
    return;
  }

  // Shape tools — show dialog
  if (['rect','circle','oval','polygon-sym','triangle'].includes(S.tool)) {
    pendingShapePos = snapped;
    openShapeModal(S.tool);
  }
}

function onPointerMove(e) {
  S.pointers[e.pointerId] = { x: e.clientX, y: e.clientY };
  const pCount = Object.keys(S.pointers).length;

  if (pCount === 2) {
    // Pinch zoom
    const pts = Object.values(S.pointers);
    const dist = Math.hypot(pts[1].x-pts[0].x, pts[1].y-pts[0].y);
    if (S.lastPinchDist) {
      const ratio = dist / S.lastPinchDist;
      const midX = (pts[0].x+pts[1].x)/2, midY = (pts[0].y+pts[1].y)/2;
      zoomAt(midX, midY, ratio);
      // Also pan
      const dx = midX - S._pinchMidX, dy = midY - S._pinchMidY;
      S.originX += dx; S.originY += dy;
      S._pinchMidX = midX; S._pinchMidY = midY;
    }
    S.lastPinchDist = dist;
    markDirty(); return;
  }

  const cp = getCanvasPos(e);
  const wpt = screenToWorld(cp.x, cp.y);
  const snapped = applySnap(wpt.x, wpt.y);
  S._cursorWorld = snapped;

  // Snap indicator
  S._snapIndicator = null;
  if (S.snapVertex && (S.tool === 'move' || S.drawPoints.length > 0)) {
    let bestD = 15 / S.scale, bestV = null;
    for (const sh of S.layers) {
      if (sh.id === S.dragShapeId) continue;
      for (const v of getVertices(sh)) {
        const d = Math.hypot(v.x - wpt.x, v.y - wpt.y);
        if (d < bestD) { bestD = d; bestV = v; }
      }
    }
    if (bestV) S._snapIndicator = bestV;
  }

  if (S.dragging && S.dragShapeId) {
    const sh = S.layers.find(l=>l.id===S.dragShapeId);
    if (!sh) return;
    const nx = snapped.x + S.dragOfsX, ny = snapped.y + S.dragOfsY;
    const bb = getBoundingBox(sh);
    const cx = (bb.minX+bb.maxX)/2, cy = (bb.minY+bb.maxY)/2;
    moveShape(sh, nx-cx, ny-cy);
    markDirty(); return;
  }

  if (S.drawPoints.length > 0 || S.drawing || (S.tool==='dimension'&&S.dimStep===1)) {
    markDirty();
  }
}

function onPointerUp(e) {
  delete S.pointers[e.pointerId];
  S.lastPinchDist = null;
  if (S.dragging) {
    S.dragging = false; S.dragShapeId = null;
    canvas.classList.remove('dragging');
    pushHistory(); // save after drag
  }
}

function onWheel(e) {
  e.preventDefault();
  const cp = getCanvasPos(e);
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  zoomAt(cp.x, cp.y, delta);
}

function zoomAt(sx, sy, ratio) {
  const newScale = Math.min(Math.max(S.scale * ratio, 0.2), 50);
  const factor = newScale / S.scale;
  S.originX = sx + (S.originX - sx) * factor;
  S.originY = sy + (S.originY - sy) * factor;
  S.scale = newScale;
  markDirty();
}

// Middle-click / space+drag for pan
let _spaceDown = false;
let _panStart = null;
document.addEventListener('keydown', e => {
  if (e.code === 'Space') { _spaceDown = true; e.preventDefault(); }
  if (e.code === 'KeyZ' && (e.ctrlKey || e.metaKey)) { e.shiftKey ? redo() : undo(); e.preventDefault(); }
  if (e.code === 'Escape') { setTool('select'); }
  if (e.code === 'Delete' || e.code === 'Backspace') { if (S.selectedId) deleteSelected(); }
});
document.addEventListener('keyup', e => { if (e.code === 'Space') _spaceDown = false; });

canvas.addEventListener('mousedown', e => {
  if (e.button === 1 || _spaceDown) {
    _panStart = { x: e.clientX, y: e.clientY, ox: S.originX, oy: S.originY };
    canvas.style.cursor = 'grabbing';
  }
});
canvas.addEventListener('mousemove', e => {
  if (_panStart) {
    S.originX = _panStart.ox + e.clientX - _panStart.x;
    S.originY = _panStart.oy + e.clientY - _panStart.y;
    markDirty();
  }
});
canvas.addEventListener('mouseup', e => { if (_panStart) { _panStart = null; canvas.style.cursor = ''; } });

// ─── HIT TEST ────────────────────────────────────────────────────────────────
function hitTest(sx, sy) {
  for (let i = S.layers.length - 1; i >= 0; i--) {
    const sh = S.layers[i];
    if (!sh.visible || sh.locked) continue;
    if (shapeHit(sh, sx, sy)) return sh;
  }
  return null;
}

function shapeHit(sh, sx, sy) {
  const tol = 8;
  if (sh.type === 'rect') {
    const p1 = worldToScreen(sh.x, sh.y), p2 = worldToScreen(sh.x+sh.w, sh.y+sh.h);
    const l=Math.min(p1.x,p2.x), r=Math.max(p1.x,p2.x), t=Math.min(p1.y,p2.y), b=Math.max(p1.y,p2.y);
    return sx>=l-tol && sx<=r+tol && sy>=t-tol && sy<=b+tol;
  }
  if (sh.type === 'circle') {
    const c = worldToScreen(sh.cx, sh.cy);
    return Math.hypot(sx-c.x, sy-c.y) <= sh.r*S.scale + tol;
  }
  if (sh.type === 'oval') {
    const c = worldToScreen(sh.cx, sh.cy);
    const rx = sh.rx*S.scale+tol, ry = sh.ry*S.scale+tol;
    return ((sx-c.x)/rx)**2 + ((sy-c.y)/ry)**2 <= 1;
  }
  const bb = getBoundingBox(sh);
  if (!bb) return false;
  const p1 = worldToScreen(bb.minX, bb.minY), p2 = worldToScreen(bb.maxX, bb.maxY);
  return sx>=Math.min(p1.x,p2.x)-tol && sx<=Math.max(p1.x,p2.x)+tol && sy>=Math.min(p1.y,p2.y)-tol && sy<=Math.max(p1.y,p2.y)+tol;
}

// ─── SHAPE MANAGEMENT ────────────────────────────────────────────────────────
let shapeCounters = {};

function nextName(type) {
  shapeCounters[type] = (shapeCounters[type] || 0) + 1;
  const names = { rect:'Rectángulo', circle:'Círculo', oval:'Óvalo', 'polygon-sym':'Polígono',
    'polygon-free':'Polígono libre', triangle:'Triángulo', line:'Línea', dimension:'Cota' };
  return (names[type] || type) + ' ' + shapeCounters[type];
}

function addShape(data) {
  const sh = Object.assign({
    id: uid(), visible: true, locked: false,
    strokeColor: S.strokeColor, strokeWidth: S.strokeWidth, fillColor: 'none',
    extruded: false, extrudeH: 0, sectionsH: 0, sectionsV: 0, sectionsAngular: 0,
    name: nextName(data.type)
  }, data);
  S.layers.push(sh);
  S.selectedId = sh.id;
  renderLayerPanel();
  markDirty();
  return sh;
}

function moveShape(sh, dx, dy) {
  if (sh.type === 'rect') { sh.x += dx; sh.y += dy; }
  else if (sh.type === 'circle') { sh.cx += dx; sh.cy += dy; }
  else if (sh.type === 'oval') { sh.cx += dx; sh.cy += dy; }
  else if (sh.type === 'polygon-sym') { sh.cx += dx; sh.cy += dy; }
  else if (sh.type === 'triangle') { sh.x += dx; sh.y += dy; }
  else if (sh.type === 'polygon-free') { sh.points = sh.points.map(p => ({x:p.x+dx,y:p.y+dy})); }
  else if (sh.type === 'line') { sh.x1+=dx; sh.y1+=dy; sh.x2+=dx; sh.y2+=dy; }
  else if (sh.type === 'dimension') { sh.x1+=dx; sh.y1+=dy; sh.x2+=dx; sh.y2+=dy; }
}

function deleteSelected() {
  if (!S.selectedId) return;
  pushHistory();
  S.layers = S.layers.filter(l => l.id !== S.selectedId);
  S.selectedId = null; hideFloatTb();
  renderLayerPanel(); markDirty();
}

function finishFreePolygon() {
  if (S.drawPoints.length < 3) { S.drawPoints = []; return; }
  pushHistory();
  addShape({ type:'polygon-free', points: [...S.drawPoints] });
  S.drawPoints = [];
  setTool('select');
}

// ─── FLOAT TOOLBAR ───────────────────────────────────────────────────────────
function showFloatTb(sx, sy) {
  const ftb = document.getElementById('float-tb');
  ftb.style.display = 'flex';
  const wr = wrap.getBoundingClientRect();
  let tx = sx - wr.left;
  let ty = sy - wr.top - 60;
  if (ty < 10) ty = sy - wr.top + 20;
  ftb.style.left = Math.max(0, Math.min(tx, wrap.clientWidth - 260)) + 'px';
  ftb.style.top = Math.max(0, ty) + 'px';
}

function hideFloatTb() {
  document.getElementById('float-tb').style.display = 'none';
}

// ─── SHAPE DIALOGS ────────────────────────────────────────────────────────────
function openShapeModal(type) {
  const modal = document.getElementById('shape-modal');
  document.getElementById('shape-modal-title').textContent = {
    rect:'Nuevo Rectángulo', circle:'Nuevo Círculo', oval:'Nuevo Óvalo',
    'polygon-sym':'Polígono Simétrico', triangle:'Nuevo Triángulo'
  }[type] || 'Nueva figura';

  document.getElementById('shape-modal-body').innerHTML = buildShapeForm(type, null);
  modal.classList.add('open');
  modal._type = type;
  modal._editing = false;
  setTimeout(() => modal.querySelector('input,select') && modal.querySelector('input,select').focus(), 100);
}

function buildShapeForm(type, sh) {
  const u = S.unit;
  if (type === 'rect') {
    const bVal = sh ? fromMM(sh.w).toFixed(2) : '';
    const hVal = sh ? fromMM(sh.h).toFixed(2) : '';
    return `<div class="form-row"><label>Base (${u})</label><input type="number" id="sh-base" value="${bVal}" min="0.01" step="any" placeholder="ej: 120"></div>
            <div class="form-row"><label>Altura (${u})</label><input type="number" id="sh-height" value="${hVal}" min="0.01" step="any" placeholder="ej: 60"></div>`;
  }
  if (type === 'circle') {
    const dVal = sh ? fromMM(sh.r*2).toFixed(2) : '';
    return `<div class="form-row"><label>Diámetro (${u})</label><input type="number" id="sh-diam" value="${dVal}" min="0.01" step="any" placeholder="ej: 50"></div>`;
  }
  if (type === 'oval') {
    const bVal = sh ? fromMM(sh.rx*2).toFixed(2) : '';
    const hVal = sh ? fromMM(sh.ry*2).toFixed(2) : '';
    return `<div class="form-row"><label>Ancho (${u})</label><input type="number" id="sh-base" value="${bVal}" min="0.01" step="any" placeholder="ej: 80"></div>
            <div class="form-row"><label>Alto (${u})</label><input type="number" id="sh-height" value="${hVal}" min="0.01" step="any" placeholder="ej: 50"></div>`;
  }
  if (type === 'polygon-sym') {
    const sidesVal = sh ? sh.sides : 6;
    const rVal = sh ? fromMM(sh.radius).toFixed(2) : '';
    return `<div class="form-row"><label>Número de lados</label><input type="number" id="sh-sides" value="${sidesVal}" min="3" max="24" step="1"></div>
            <div class="form-row"><label>Radio (${u})</label><input type="number" id="sh-radius" value="${rVal}" min="0.01" step="any" placeholder="ej: 40"></div>`;
  }
  if (type === 'triangle') {
    const vr = sh ? sh.variant : 'base-height';
    const bVal = sh ? fromMM(sh.base).toFixed(2) : '';
    const hVal = sh ? (sh.variant!=='equilateral' ? fromMM(sh.height).toFixed(2) : '') : '';
    return `<div class="form-row"><label>Tipo</label>
              <div class="radio-group">
                <label class="radio-opt"><input type="radio" name="tri-type" value="equilateral" ${vr==='equilateral'?'checked':''}> Equilátero (solo base)</label>
                <label class="radio-opt"><input type="radio" name="tri-type" value="base-height" ${vr==='base-height'?'checked':''}> Base × Altura</label>
                <label class="radio-opt"><input type="radio" name="tri-type" value="right" ${vr==='right'?'checked':''}> Triángulo rectángulo</label>
              </div></div>
            <div class="form-row"><label>Base (${u})</label><input type="number" id="sh-base" value="${bVal}" min="0.01" step="any"></div>
            <div class="form-row" id="sh-height-row" ${vr==='equilateral'?'style="display:none"':''}><label>Altura (${u})</label><input type="number" id="sh-height" value="${hVal}" min="0.01" step="any"></div>`;
  }
  return '';
}

function closeShapeModal() { document.getElementById('shape-modal').classList.remove('open'); }
function closeEditModal() { document.getElementById('edit-modal').classList.remove('open'); }

function confirmShape() {
  const type = document.getElementById('shape-modal')._type;
  const data = readShapeForm(type, pendingShapePos);
  if (!data) return;
  pushHistory();
  addShape(data);
  closeShapeModal();
  setTool('select');
  markDirty();
}

function readShapeForm(type, pos) {
  if (type === 'rect') {
    const w = toMM(document.getElementById('sh-base').value);
    const h = toMM(document.getElementById('sh-height').value);
    if (!w || !h) { toast('Ingresa base y altura'); return null; }
    return { type:'rect', x: pos.x - w/2, y: pos.y - h/2, w, h };
  }
  if (type === 'circle') {
    const d = toMM(document.getElementById('sh-diam').value);
    if (!d) { toast('Ingresa el diámetro'); return null; }
    return { type:'circle', cx: pos.x, cy: pos.y, r: d/2 };
  }
  if (type === 'oval') {
    const w = toMM(document.getElementById('sh-base').value);
    const h = toMM(document.getElementById('sh-height').value);
    if (!w || !h) { toast('Ingresa ancho y alto'); return null; }
    return { type:'oval', cx: pos.x, cy: pos.y, rx: w/2, ry: h/2 };
  }
  if (type === 'polygon-sym') {
    const sides = parseInt(document.getElementById('sh-sides').value) || 6;
    const r = toMM(document.getElementById('sh-radius').value);
    if (!r) { toast('Ingresa el radio'); return null; }
    return { type:'polygon-sym', cx: pos.x, cy: pos.y, sides, radius: r, rotation: -Math.PI/2 };
  }
  if (type === 'triangle') {
    const vr = document.querySelector('input[name="tri-type"]:checked')?.value || 'base-height';
    const base = toMM(document.getElementById('sh-base').value);
    const height = vr === 'equilateral' ? base * Math.sqrt(3)/2 : toMM(document.getElementById('sh-height')?.value || 0);
    if (!base) { toast('Ingresa la base'); return null; }
    return { type:'triangle', variant: vr, x: pos.x - base/2, y: pos.y - height/2, base, height };
  }
  return null;
}

// Edit modal
function editSelected() {
  if (!S.selectedId) return;
  const sh = S.layers.find(l => l.id === S.selectedId);
  if (!sh || sh.type === 'dimension' || sh.type === 'line') return;
  pendingEditId = sh.id;
  document.getElementById('edit-modal-title').textContent = 'Editar ' + sh.name;
  document.getElementById('edit-modal-body').innerHTML =
    buildShapeForm(sh.type, sh) +
    `<div class="form-row"><label>Nombre</label><input type="text" id="sh-name" value="${sh.name}"></div>
     <div class="form-row"><label>Color de línea</label><input type="color" id="sh-color" value="${sh.strokeColor||'#000000'}" style="width:48px;height:36px;border-radius:8px;border:1px solid var(--border);cursor:pointer;padding:0;"></div>
     <div class="form-row"><label>Grosor</label><input type="number" id="sh-sw" value="${sh.strokeWidth||2}" min="0.5" max="20" step="0.5"></div>`;
  document.getElementById('edit-modal')._sh = sh;
  document.getElementById('edit-modal').classList.add('open');
}

function confirmEdit() {
  const sh = document.getElementById('edit-modal')._sh;
  if (!sh) return;
  pushHistory();
  const pos = { x: sh.cx || sh.x || sh.x1 || 0, y: sh.cy || sh.y || sh.y1 || 0 };
  const data = readShapeForm(sh.type, pos);
  if (data) {
    Object.assign(sh, data);
    const nameEl = document.getElementById('sh-name');
    if (nameEl) sh.name = nameEl.value || sh.name;
    const colorEl = document.getElementById('sh-color');
    if (colorEl) sh.strokeColor = colorEl.value;
    const swEl = document.getElementById('sh-sw');
    if (swEl) sh.strokeWidth = parseFloat(swEl.value) || 2;
  }
  closeEditModal();
  renderLayerPanel(); markDirty();
}

// Section modal
function sectionSelected() {
  const sh = S.layers.find(l => l.id === S.selectedId);
  if (!sh) return;
  const isCircular = ['circle','oval','polygon-sym','triangle','polygon-free'].includes(sh.type);
  let body = '';
  if (!isCircular) {
    body = `<div class="form-row"><label>Divisiones verticales</label><input type="number" id="sec-v" value="${sh.sectionsV||1}" min="1" max="50"></div>
            <div class="form-row"><label>Divisiones horizontales</label><input type="number" id="sec-h" value="${sh.sectionsH||1}" min="1" max="50"></div>`;
  }
  body += `<div class="form-row"><label>Divisiones angulares / radiales</label><input type="number" id="sec-a" value="${sh.sectionsAngular||0}" min="0" max="36"></div>`;
  if (sh.extruded) {
    body += `<div class="form-row"><label>Divisiones en altura</label><input type="number" id="sec-z" value="${sh.sectionsZ||0}" min="0" max="20"></div>`;
  }
  document.getElementById('section-modal-body').innerHTML = body;
  document.getElementById('section-modal').classList.add('open');
}

function confirmSection() {
  const sh = S.layers.find(l => l.id === S.selectedId);
  if (!sh) return;
  pushHistory();
  const sv = document.getElementById('sec-v'), sh2 = document.getElementById('sec-h'), sa = document.getElementById('sec-a');
  if (sv) sh.sectionsV = parseInt(sv.value) || 1;
  if (sh2) sh.sectionsH = parseInt(sh2.value) || 1;
  if (sa) sh.sectionsAngular = parseInt(sa.value) || 0;
  const sz = document.getElementById('sec-z'); if (sz) sh.sectionsZ = parseInt(sz.value) || 0;
  document.getElementById('section-modal').classList.remove('open');
  markDirty();
}

// Extrude modal
function extrudeSelected() {
  const sh = S.layers.find(l => l.id === S.selectedId);
  if (!sh) return;
  document.getElementById('extrude-h-inp').value = sh.extruded ? fromMM(sh.extrudeH).toFixed(1) : 100;
  document.getElementById('extrude-modal').classList.add('open');
}

function confirmExtrude() {
  const sh = S.layers.find(l => l.id === S.selectedId);
  if (!sh) return;
  pushHistory();
  const h = toMM(document.getElementById('extrude-h-inp').value);
  if (!h) { toast('Ingresa la altura'); return; }
  sh.extruded = true; sh.extrudeH = h;
  if (!sh.name.startsWith('Vol:')) sh.name = 'Vol: ' + sh.name;
  document.getElementById('extrude-modal').classList.remove('open');
  renderLayerPanel(); markDirty();
}

// Auto dimension
function autoDimSelected() {
  const sh = S.layers.find(l => l.id === S.selectedId);
  if (!sh) return;
  pushHistory();
  if (sh.type === 'rect') {
    const u = S.unit;
    const offset = 120; // mm
    // Bottom (width)
    addShape({ type:'dimension', x1:sh.x, y1:sh.y-offset, x2:sh.x+sh.w, y2:sh.y-offset, name:'Cota' });
    // Right (height)
    addShape({ type:'dimension', x1:sh.x+sh.w+offset, y1:sh.y, x2:sh.x+sh.w+offset, y2:sh.y+sh.h, name:'Cota' });
    // Section dims
    if (sh.sectionsV > 1) {
      const step = sh.w / sh.sectionsV;
      for (let i = 0; i < sh.sectionsV; i++) {
        addShape({ type:'dimension', x1:sh.x+step*i, y1:sh.y-offset*1.6, x2:sh.x+step*(i+1), y2:sh.y-offset*1.6, name:'Cota' });
      }
    }
    if (sh.sectionsH > 1) {
      const step = sh.h / sh.sectionsH;
      for (let i = 0; i < sh.sectionsH; i++) {
        addShape({ type:'dimension', x1:sh.x+sh.w+offset*1.6, y1:sh.y+step*i, x2:sh.x+sh.w+offset*1.6, y2:sh.y+step*(i+1), name:'Cota' });
      }
    }
  } else {
    const bb = getBoundingBox(sh);
    if (!bb) return;
    const off = 80;
    addShape({ type:'dimension', x1:bb.minX, y1:bb.minY-off, x2:bb.maxX, y2:bb.minY-off, name:'Cota' });
    addShape({ type:'dimension', x1:bb.maxX+off, y1:bb.minY, x2:bb.maxX+off, y2:bb.maxY, name:'Cota' });
  }
  toast('Cotas aplicadas');
  renderLayerPanel(); markDirty();
}

// ─── LAYER PANEL ─────────────────────────────────────────────────────────────
function renderLayerPanel() {
  const list = document.getElementById('layer-list');
  if (!S.layers.length) { list.innerHTML = '<div style="text-align:center;color:var(--gray);font-size:12px;padding:30px;">Sin capas todavía</div>'; return; }
  list.innerHTML = [...S.layers].reverse().map((sh, ri) => {
    const i = S.layers.length - 1 - ri;
    const sel = sh.id === S.selectedId;
    const ico = { rect:'ph-rectangle', circle:'ph-circle', oval:'ph-circle-dashed', 'polygon-sym':'ph-hexagon',
      'polygon-free':'ph-polygon', triangle:'ph-triangle', line:'ph-line-segment', dimension:'ph-ruler' }[sh.type] || 'ph-shapes';
    return `<div class="layer-row ${sel?'selected':''}" onclick="selectLayerById('${sh.id}')">
      <button class="layer-icon-btn ${sh.visible?'':'active'}" onclick="event.stopPropagation();toggleLayerVisible('${sh.id}')" title="Visibilidad">
        <i class="ph-bold ${sh.visible?'ph-eye':'ph-eye-slash'}"></i>
      </button>
      <button class="layer-icon-btn ${sh.locked?'active':''}" onclick="event.stopPropagation();toggleLayerLock('${sh.id}')" title="Bloquear">
        <i class="ph-bold ${sh.locked?'ph-lock-simple':'ph-lock-simple-open'}"></i>
      </button>
      <i class="ph-bold ${ico}" style="font-size:14px;color:var(--gray);flex-shrink:0;"></i>
      <div class="layer-name" ondblclick="renameLayer('${sh.id}',this)">${sh.name}</div>
      <button class="layer-icon-btn" onclick="event.stopPropagation();moveLayerUp(${i})" title="Subir"><i class="ph-bold ph-caret-up"></i></button>
      <button class="layer-icon-btn" onclick="event.stopPropagation();moveLayerDown(${i})" title="Bajar"><i class="ph-bold ph-caret-down"></i></button>
      <button class="layer-icon-btn" onclick="event.stopPropagation();deleteLayerById('${sh.id}')" style="color:var(--red)"><i class="ph-bold ph-trash"></i></button>
    </div>`;
  }).join('');
}

function selectLayerById(id) {
  S.selectedId = id; markDirty(); renderLayerPanel();
}

function toggleLayerVisible(id) {
  const sh = S.layers.find(l=>l.id===id);
  if (sh) { sh.visible = !sh.visible; markDirty(); renderLayerPanel(); }
}
function toggleLayerLock(id) {
  const sh = S.layers.find(l=>l.id===id);
  if (sh) { sh.locked = !sh.locked; renderLayerPanel(); }
}
function deleteLayerById(id) {
  pushHistory();
  S.layers = S.layers.filter(l=>l.id!==id);
  if (S.selectedId===id) { S.selectedId=null; hideFloatTb(); }
  renderLayerPanel(); markDirty();
}
function moveLayerUp(i) {
  if (i < S.layers.length-1) { [S.layers[i],S.layers[i+1]] = [S.layers[i+1],S.layers[i]]; markDirty(); renderLayerPanel(); }
}
function moveLayerDown(i) {
  if (i > 0) { [S.layers[i],S.layers[i-1]] = [S.layers[i-1],S.layers[i]]; markDirty(); renderLayerPanel(); }
}
function renameLayer(id, el) {
  const sh = S.layers.find(l=>l.id===id);
  if (!sh) return;
  const newName = prompt('Nuevo nombre:', sh.name);
  if (newName) { sh.name = newName; renderLayerPanel(); }
}

// ─── UNDO / REDO ─────────────────────────────────────────────────────────────
function pushHistory() {
  const snap = JSON.stringify(S.layers);
  if (S.histIdx < S.history.length-1) S.history = S.history.slice(0, S.histIdx+1);
  S.history.push(snap);
  if (S.history.length > 50) S.history.shift();
  S.histIdx = S.history.length - 1;
}

function undo() {
  if (S.histIdx <= 0) { toast('Sin más acciones para deshacer'); return; }
  S.histIdx--;
  S.layers = JSON.parse(S.history[S.histIdx]);
  S.selectedId = null; hideFloatTb();
  renderLayerPanel(); markDirty();
}

function redo() {
  if (S.histIdx >= S.history.length-1) { toast('Sin más acciones para rehacer'); return; }
  S.histIdx++;
  S.layers = JSON.parse(S.history[S.histIdx]);
  renderLayerPanel(); markDirty();
}

// ─── SAVE / LOAD ─────────────────────────────────────────────────────────────
function saveAsImage() {
  document.getElementById('save-pop').style.display = 'none';
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = `Plano_${S.view}_${Date.now()}.png`;
  a.click();
  toast('Imagen guardada');
}

async function saveToFirebase() {
  document.getElementById('save-pop').style.display = 'none';
  if (!cid || !pid) { toast('Sin proyecto vinculado'); return; }
  try {
    const user = firebase.auth().currentUser;
    if (!user) { toast('No autenticado'); return; }
    const data = { layers: S.layers, view: S.view, unit: S.unit, scale: S.scale,
      originX: S.originX, originY: S.originY, savedAt: Date.now() };
    await db.ref(`proyectos/${cid}/${pid}/cad/drawings`).push(data);
    toast('✅ Plano guardado en el proyecto');
  } catch(e) { toast('Error: ' + e.message); }
}

async function loadFromFirebase() {
  document.getElementById('save-pop').style.display = 'none';
  if (!cid || !pid) { toast('Sin proyecto vinculado'); return; }
  try {
    const snap = await db.ref(`proyectos/${cid}/${pid}/cad/drawings`).limitToLast(1).once('value');
    if (!snap.exists()) { toast('No hay planos guardados'); return; }
    const val = Object.values(snap.val())[0];
    pushHistory();
    S.layers = val.layers || [];
    if (val.view) S.view = val.view;
    if (val.unit) S.unit = val.unit;
    if (val.scale) S.scale = val.scale;
    if (val.originX) S.originX = val.originX;
    if (val.originY) S.originY = val.originY;
    renderLayerPanel(); markDirty();
    toast('✅ Plano cargado');
  } catch(e) { toast('Error: ' + e.message); }
}

// Radio buttons in triangle dialog
document.getElementById('shape-modal').addEventListener('change', e => {
  if (e.target.name === 'tri-type') {
    const hr = document.getElementById('sh-height-row');
    if (hr) hr.style.display = e.target.value === 'equilateral' ? 'none' : '';
  }
});

// Close modals on background click
document.querySelectorAll('.modal-bg').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
pushHistory(); // initial empty state
renderLayerPanel();
renderLoop();
</script>
</body>
</html>
